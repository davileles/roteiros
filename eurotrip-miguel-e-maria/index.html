 e chegada no fim do dia, recomenda-se transfer privativo ou táxi oficial, não trem.","lat":48.3538,"lng":11.7861},{"horario":"18:20 – 19:10","nome":"Transfer Aeroporto de Munique → Hotel no Centro Histórico","descricao":"O aeroporto é conectado ao centro pelas linhas S1 e S8, com cerca de 40 min até a estação central. Para vocês, o melhor custo-conforto é ir direto de carro. O S-Bahn funciona bem como plano B.","dica":"Plano B: Airport-City-Day-Ticket, válido entre aeroporto e centro no dia.","lat":48.1404,"lng":11.5757},{"horario":"19:10 – 20:15","nome":"Check-in, Banho e Pausa no Hotel","descricao":"Sugestão de base: Hotel Bayerischer Hof ou Mandarin Oriental Munich — localização excelente para jantar bonito sem deslocamento complexo.","dica":"Peçam ao hotel ajuda para reservar o jantar antes da viagem. 31/07 é alta temporada europeia.","lat":48.1404,"lng":11.5757},{"horario":"20:30 – 22:15","nome":"Jantar Especial de Chegada — Munich Sushi Club","descricao":"Rooftop do Mandarin Oriental. Cozinha japonesa-peruana, vista da cidade e dress code smart casual. Funciona de 1º de maio a 18 de setembro, jantar das 17h às 21h.","dica":"Reserve mesa para 20:30. Avise que será a primeira noite da Maria na Europa.","lat":48.1373,"lng":11.5754},{"horario":"22:15 – 22:40","nome":"Caminhada Noturna pelo Centro Histórico","descricao":"Volta leve pela região de Marienplatz / Frauenkirche, sem compromisso. É só para a Maria sentir a atmosfera europeia pela primeira vez.","dica":"Se estiverem cansados, voltem direto de carro app/táxi. O objetivo do dia é chegar bem.","lat":48.1374,"lng":11.5755}],"deslocamentos":["✈ Aeroporto → Hotel: Transfer privativo ou táxi oficial · 35-50 min · ~€40-55/casal","🚶 Hotel → Munich Sushi Club: 10-15 min a pé (Bayerischer Hof) ou no próprio hotel (Mandarin Oriental)","💰 Total estimado do dia: R$ 768 – 1.182 por pessoa"]},{"num":2,"data":"2025-08-01","titulo":"Munique Clássica: Cultura, Moda e Rooftop","resumo":"Primeiro dia inteiro da Maria na Europa: centro histórico, mercado gastronômico, palácio real, ruas elegantes e fim de tarde bonito. Munique sem pressa, com estética, cultura e bons pontos para fotografia.","energia":"Moderado","atividades":[{"horario":"09:30 – 10:00","nome":"Caminhada até Marienplatz","descricao":"Praça mais simbólica de Munique, com arquitetura clássica, fachadas históricas e aquele impacto visual de \"cheguei na Europa\".","dica":"Cheguem antes do pico do meio-dia para fotos melhores e menos multidão.","lat":48.1374,"lng":11.5755},{"horario":"10:00 – 11:15","nome":"Marienplatz + Arredores da Frauenkirche","descricao":"Passeio leve pelo coração antigo da cidade, ótimo para fotos, vitrines e cafés. Primeiro contato europeu bem forte para a Maria, sem exigir deslocamento.","dica":"Façam uma parada rápida para café antes de seguir ao mercado.","lat":48.1385,"lng":11.5733},{"horario":"11:15 – 12:30","nome":"Viktualienmarkt","descricao":"Mercado histórico ao ar livre de Munique. Produtos locais, flores, bancas gastronômicas e referências visuais. Funciona seg-sáb, 8h-20h; domingo fechado.","dica":"Ótimo para refeição leve, fotos espontâneas e compra de pequenos itens gastronômicos.","lat":48.1351,"lng":11.5763},{"horario":"12:30 – 14:00","nome":"Almoço Leve no Centro Histórico","descricao":"Almoço no próprio Viktualienmarkt ou em brasserie próxima. A ideia é não pesar o dia, porque a tarde tem palácio e compras.","dica":"Evitem almoço longo demais; deixem o jantar como refeição principal.","lat":48.1351,"lng":11.5763},{"horario":"14:15 – 16:15","nome":"Munich Residenz","descricao":"Antiga residência dos governantes da Baviera. Salas históricas e interiores fotogênicos. Abre 9h-18h (última entrada 17h), de 28/03 a 19/10. Ingresso combinado Residence Museum + Treasury + Cuvilliés Theatre: €20 em 2026.","dica":"Comprem online se possível.","lat":48.1416,"lng":11.5786},{"horario":"16:15 – 17:45","nome":"Maximilianstraße + Lojas e Referências de Moda","descricao":"Rua mais elegante de Munique: vitrines de luxo, arquitetura imponente e ótimas referências de visual merchandising para as marcas Tailor's Mind e Ziv.","dica":"Observem vitrine, styling, materiais, paleta de cores e experiência de loja.","lat":48.1394,"lng":11.5824},{"horario":"17:45 – 19:00","nome":"Pausa no Hotel","descricao":"Banho, troca de roupa e descanso antes do jantar. Respiro importante para manter o ritmo sem correria.","dica":"","lat":48.1404,"lng":11.5757},{"horario":"19:30 – 21:45","nome":"Jantar com Vista / Rooftop","descricao":"Munich Sushi Club ou Roof Garden Terrace no Bayerischer Hof — atmosfera acima dos telhados da cidade. Em agosto, reservar com antecedência é essencial.","dica":"Peçam mesa externa se o clima permitir.","lat":48.1404,"lng":11.5757}],"deslocamentos":["🚶 Hotel → Marienplatz: A pé · 7-10 min (Bayerischer Hof) / 5-8 min (Mandarin Oriental)","🚶 Marienplatz → Viktualienmarkt: A pé · 5 min","🚶 Viktualienmarkt → Residenz: A pé · 12-15 min / táxi curto se muito calor","🚶 Residenz → Maximilianstraße → Hotel: A pé ou táxi curto","💰 Total estimado do dia: R$ 815 – 1.330 por pessoa"]},{"num":3,"data":"2025-08-02","titulo":"Munique → Nápoles → Chegada de Barco em Amalfi","resumo":"A virada cinematográfica da viagem: saem de Munique, pousam em Nápoles e chegam à Costa Amalfitana pelo mar. Amalfi aparecendo entre montanhas, mar e casinhas coloridas.","energia":"Moderado","atividades":[{"horario":"08:30 – 09:15","nome":"Hotel em Munique → Aeroporto (S-Bahn S8 ou S1)","descricao":"Saiam em direção à estação mais próxima (Marienplatz, Karlsplatz/Stachus ou Hauptbahnhof). Peguem S-Bahn até o Flughafen München.","dica":"Com mala grande: táxi curto hotel→estação, depois S-Bahn. Evita desgaste logo cedo.","lat":48.1402,"lng":11.56},{"horario":"09:15 – 11:30","nome":"Check-in, Bagagem e Embarque em Munique","descricao":"Voo intraeuropeu com bagagem despachada: cheguem com 2 horas de antecedência. Prioridade: voo direto Munique → Nápoles chegando até ~13:30/14:00.","dica":"Incluam bagagem despachada e assentos próximos da frente para desembarcar mais rápido.","lat":48.3538,"lng":11.7861},{"horario":"11:30 – 13:15","nome":"Voo Munique → Nápoles","descricao":"Prioridade: voo direto, sem conexão, para reduzir risco de atraso e cansaço.","dica":"","lat":40.886,"lng":14.2908},{"horario":"13:15 – 14:00","nome":"Chegada em Nápoles + Retirada de Bagagem","descricao":"Sigam direto para retirada das malas. Não marquem almoço formal em Nápoles — o foco é garantir o ferry.","dica":"Comprem algo rápido no aeroporto ou no porto.","lat":40.886,"lng":14.2908},{"horario":"14:00 – 14:30","nome":"Aeroporto de Nápoles → Molo Beverello","descricao":"Táxi oficial ou transfer curto até Napoli Beverello / Molo Beverello, principal ponto de saída dos ferries rápidos para Amalfi.","dica":"","lat":40.8385,"lng":14.254},{"horario":"15:35 – 17:30","nome":"Ferry Napoli Beverello → Amalfi (NLG)","descricao":"Rota direta NLG — saída-alvo 15:35 (confirmar com operadora). Duração: ~1h45-2h. Transforma o deslocamento em experiência.","dica":"Cheguem ao porto com 45-60 min de antecedência. Localizem o embarque correto com as malas.","lat":40.634,"lng":14.6027},{"horario":"17:30 – 18:00","nome":"Porto de Amalfi → Grand Hotel Excelsior","descricao":"Shuttle gratuito do hotel (~10 min). Contate o hotel antes para confirmar retirada próximo ao porto. Plano B: táxi local.","dica":"","lat":40.628,"lng":14.598},{"horario":"18:00 – 19:30","nome":"Check-in, Banho e Primeira Pausa com Vista","descricao":"Respirem, abram a varanda, vejam o mar. Peçam quarto com vista para o mar.","dica":"","lat":40.628,"lng":14.598},{"horario":"20:30 – 22:30","nome":"Jantar de Chegada — Marina Grande Restaurant","descricao":"Direto na praia, vista para o mar, frutos do mar e cozinha clássica (Guia Michelin). Reservem mesa externa e mencionem que é a primeira noite na Costa Amalfitana.","dica":"","lat":40.6337,"lng":14.6023}],"deslocamentos":["🚆 Munique centro → Aeroporto: S-Bahn S8/S1 · 40-45 min","✈ Munique → Nápoles: Voo direto · ~1h45","🚗 Aeroporto Nápoles → Beverello: Táxi · 25-35 min","⛴ Beverello → Amalfi: Ferry NLG · saída 15:35 · ~1h45-2h","🚐 Porto → Hotel: Shuttle (reservar) ou táxi local","Plano B: B1 via Salerno (ferry) · B2 transfer privativo direto ao hotel","💰 Total estimado do dia: R$ 1.682 – 3.020 por pessoa"]},{"num":4,"data":"2025-08-03","titulo":"Amalfi Sem Pressa: Centro, Praia e Jantar com Vista","resumo":"Primeiro dia inteiro para viver Amalfi sem correria. Café, Duomo, lojinhas, praia e jantar com vista criam o ritmo perfeito: romântico, estético, gastronômico e solar.","energia":"Leve a Moderado","atividades":[{"horario":"09:45 – 10:00","nome":"Hotel → Centro de Amalfi (Shuttle Gratuito)","descricao":"Shuttle gratuito do Grand Hotel Excelsior até o centro (~10 min). Reservem na noite anterior — especialmente por ser agosto.","dica":"","lat":40.634,"lng":14.6027},{"horario":"10:00 – 10:45","nome":"Café no Centro de Amalfi","descricao":"Café, sfogliatella ou doce de limão perto da Piazza del Duomo. Começo leve, bonito e bem italiano.","dica":"Mesa externa se não estiver muito quente — ótimo para observar e fotografar.","lat":40.634,"lng":14.6027},{"horario":"10:45 – 12:00","nome":"Duomo di Amalfi / Catedral de Sant'Andrea","descricao":"Escadaria e fachada marcantes. A visita vale pelo impacto visual e histórico.","dica":"Confirmem horários na recepção do hotel — podem variar por celebrações religiosas.","lat":40.634,"lng":14.6023},{"horario":"12:00 – 13:00","nome":"Ruas Históricas, Lojas Locais e Referências Visuais","descricao":"Ruas estreitas próximas ao Duomo: cerâmica, moda resort, papel artesanal, sandálias e produtos de limão. Ótimo para vitrine, embalagem, paleta de cores, materiais naturais e narrativa mediterrânea.","dica":"","lat":40.6338,"lng":14.6021},{"horario":"13:00 – 14:30","nome":"Almoço à Beira-Mar — Marina Grande Restaurant","descricao":"Direto na praia — permite emendar almoço com tarde de mar sem novo deslocamento. Guia Michelin destaca a localização e vistas.","dica":"Façam reserva para almoço ou confirmem disponibilidade do beach club.","lat":40.6337,"lng":14.6023},{"horario":"14:30 – 17:30","nome":"Praia / Beach Club — Marina Grande","descricao":"Restaurante, lounge bar e experiência à beira-mar. Praias com pedras — levem sandália de água. Em agosto, reservem espreguiçadeira com antecedência.","dica":"","lat":40.6337,"lng":14.6023},{"horario":"17:30 – 19:00","nome":"Retorno ao Hotel + Descanso","descricao":"Shuttle ou táxi local. Intervalo para banho e descanso antes do jantar.","dica":"","lat":40.628,"lng":14.598},{"horario":"20:00 – 22:15","nome":"Jantar Romântico com Vista — Locanda della Canonica","descricao":"Terraço ao ar livre com vista para o Mediterrâneo. Primeiro grande jantar romântico oficial da Costa Amalfitana.","dica":"Peçam mesa no terraço e reservem com antecedência.","lat":40.6345,"lng":14.6035}],"deslocamentos":["🚐 Hotel → Centro Amalfi: Shuttle do hotel · ~10 min · reservar na noite anterior","🚶 Centro → Duomo → Ruas → Marina Grande: A pé · 2-8 min","🚐 Praia → Hotel: Shuttle ou táxi local","🚗 Hotel → Locanda della Canonica: Shuttle / táxi local (confirmar com recepção)","💰 Total estimado do dia: R$ 1.099 – 2.163 por pessoa"]},{"num":5,"data":"2025-08-04","titulo":"Capri, Gruta Azul, Monte Solaro e Faraglioni","resumo":"Um dos dias mais memoráveis da viagem: Capri vista pelo mar e do alto. Começar com Gruta Azul e Faraglioni, subir ao Monte Solaro de teleférico, passar pela Piazzetta e retornar de funicular antes do ferry de volta para Amalfi.","energia":"Moderado","atividades":[{"horario":"08:00 – 08:20","nome":"Hotel → Porto de Amalfi","descricao":"Shuttle ou táxi. Em agosto, ferries e embarques ficam mais cheios — saiam com folga.","dica":"","lat":40.634,"lng":14.6027},{"horario":"08:50 – 10:00","nome":"Ferry Amalfi → Capri (Marina Grande)","descricao":"Ferry direto Amalfi → Capri. Comprem ida e volta com antecedência. Lugar externo para curtir a chegada pelo mar.","dica":"","lat":40.5532,"lng":14.234},{"horario":"10:15 – 12:30","nome":"Passeio de Barco + Gruta Azul + Faraglioni","descricao":"Passeio de barco com prioridade para Gruta Azul (depende do mar — tentar cedo). Inclui passagem pelos Faraglioni.","dica":"A Gruta Azul exige trocar para barcos a remo na entrada. Protejam câmera. Levem dinheiro/cartão.","lat":40.5439,"lng":14.2429},{"horario":"12:30 – 13:15","nome":"Marina Grande → Anacapri","descricao":"Táxi conversível (mais confortável, rápido e fotogênico) ou ônibus local (econômico, lotado em agosto).","dica":"","lat":40.5548,"lng":14.2136},{"horario":"13:15 – 14:30","nome":"Almoço Leve em Anacapri","descricao":"Anacapri é um pouco menos caótica que Capri town — boa pausa no meio do dia. Não transformem em refeição longa.","dica":"","lat":40.5548,"lng":14.2136},{"horario":"14:30 – 15:45","nome":"Monte Solaro de Teleférico / Chairlift","descricao":"Teleférico de cadeirinhas individuais em Anacapri. ~13 min cada sentido. Vista de cima é uma das mais bonitas de Capri.","dica":"Aberto e individual — pode incomodar quem tem muito medo de altura. Confirmem horários no site oficial.","lat":40.5497,"lng":14.2109},{"horario":"15:45 – 16:30","nome":"Anacapri → Capri Town / Piazzetta","descricao":"Táxi ou ônibus. Passagem pela Piazzetta e ruas de boutiques, perfumes, sandálias e moda resort — ótimo para pesquisa visual: vitrines, styling, experiência de loja e comportamento de compra.","dica":"","lat":40.551,"lng":14.2429},{"horario":"16:30 – 17:15","nome":"Piazzetta → Funicular: Capri Town → Marina Grande","descricao":"Caminhem até a estação do Funicolare di Capri. ~3-5 min até Marina Grande. Não saiam tarde — em agosto pode haver fila para o funicular.","dica":"","lat":40.5532,"lng":14.234},{"horario":"17:30 – 18:45","nome":"Ferry Capri → Amalfi","descricao":"Cheguem ao píer com 30-40 min de folga. Agosto é alta temporada.","dica":"","lat":40.634,"lng":14.6027},{"horario":"20:30 – 22:30","nome":"Jantar Leve em Amalfi","descricao":"Centro de Amalfi ou hotel. Evitem deslocamento longo — o dia já terá sido bem completo.","dica":"","lat":40.634,"lng":14.6027}],"deslocamentos":["⛴ Amalfi ↔ Capri: Ferry direto (ida+volta antecipado)","🚗 Marina Grande → Anacapri: Táxi conversível (preferencial) ou ônibus","🚶 Anacapri → Monte Solaro: A pé até estação + chairlift (~13 min/sentido)","🚡 Capri Town → Marina Grande: Funicular · ~3-5 min","💰 Total estimado do dia: R$ 1.369 – 2.553 por pessoa"]},{"num":6,"data":"2025-08-05","titulo":"Fiordo di Furore e Positano de Ônibus","resumo":"Vocês conhecem o Fiordo di Furore e seguem para Positano de ônibus pela estrada costeira. Versão mais terrestre e econômica, mantendo os visuais clássicos da Costa Amalfitana, mas exigindo paciência com filas, lotação e escadas.","energia":"Moderado a Intenso","atividades":[{"horario":"08:15 – 08:35","nome":"Hotel → Ponto SITA em Amalfi","descricao":"Shuttle ou táxi até o centro. Comprem bilhetes antes de embarcar — normalmente não vendidos dentro do ônibus.","dica":"","lat":40.634,"lng":14.6027},{"horario":"08:45 – 09:10","nome":"Ônibus SITA Sud: Amalfi → Fiordo di Furore","descricao":"Rota Amalfi → Positano/Sorrento. Peçam ao motorista para avisar a parada do Fiordo di Furore.","dica":"Sentem do lado direito (sentido Amalfi → Positano) para melhores vistas do mar.","lat":40.6187,"lng":14.5589},{"horario":"09:10 – 10:15","nome":"Fiordo di Furore","descricao":"Fotos da ponte, do fiorde e da pequena praia — um dos cenários mais dramáticos da Costa Amalfitana. A praia é pequena e fica cheia rapidamente.","dica":"Acesso pode envolver escadas. Trate como parada visual, não manhã longa de praia.","lat":40.6187,"lng":14.5589},{"horario":"10:15 – 10:45","nome":"Espera pelo Ônibus → Positano","descricao":"Voltem ao ponto com antecedência. Risco de o ônibus passar cheio. Tenham margem e não marquem almoço cedo.","dica":"","lat":40.6187,"lng":14.5589},{"horario":"10:45 – 11:30","nome":"Ônibus Fiordo di Furore → Positano (Sponda)","descricao":"Continuem pela estrada costeira. Chegada sugerida: Positano Sponda, ponto mais prático para o centro e a praia.","dica":"","lat":40.628,"lng":14.485},{"horario":"11:30 – 12:30","nome":"Descida por Positano até a Spiaggia Grande","descricao":"Descendo em direção à Spiaggia Grande: lojinhas, moda resort, cerâmicas, sandálias e cafés. A volta exigirá subida — façam tudo sem pressa.","dica":"","lat":40.6263,"lng":14.4859},{"horario":"12:30 – 14:15","nome":"Almoço em Positano","descricao":"Restaurante perto da praia. Reservem com antecedência — agosto é muito concorrido.","dica":"","lat":40.6263,"lng":14.4859},{"horario":"14:15 – 16:30","nome":"Praia, Lojas e Fotografia em Positano","descricao":"Spiaggia Grande, lojas de resortwear, beachwear, sandálias e cafés. Ótimo para vitrine, curadoria de produto e paleta mediterrânea.","dica":"","lat":40.6263,"lng":14.4859},{"horario":"16:30 – 17:15","nome":"Subida até o Ponto de Ônibus (Positano Sponda)","descricao":"Esta será a parte mais cansativa do dia.","dica":"Se muito quente, considerem táxi interno até o ponto.","lat":40.628,"lng":14.485},{"horario":"17:15 – 18:15","nome":"Ônibus SITA Sud: Positano → Amalfi","descricao":"Fim de tarde em agosto pode ter fila e ônibus cheio. Cheguem cedo ao ponto e mantenham flexibilidade.","dica":"","lat":40.634,"lng":14.6027},{"horario":"18:15 – 19:30","nome":"Amalfi → Hotel + Descanso","descricao":"Shuttle ou táxi. Deixem esse intervalo livre para banho e descanso após calor, ônibus e escadas.","dica":"","lat":40.628,"lng":14.598},{"horario":"20:15 – 22:15","nome":"Jantar em Amalfi","descricao":"Centro de Amalfi ou hotel. Evitem Atrani neste dia — a logística terrestre já terá sido mais cansativa.","dica":"","lat":40.634,"lng":14.6027}],"deslocamentos":["🚌 Amalfi → Fiordo → Positano → Amalfi: SITA Sud (rota Amalfi-Positano-Sorrento)","🚶 Positano interno: A pé (escadas) · evite compras pesadas antes da subida ao ponto","💰 Total estimado do dia: R$ 1.184 – 2.730 por pessoa"]},{"num":7,"data":"2025-08-06","titulo":"Amalfi → Salerno → Roma e Primeira Noite na Cidade Eterna","resumo":"Vocês deixam a Costa Amalfitana e seguem para Roma com foco em conforto. Chegada leve: check-in, descanso e primeira caminhada clássica com Fontana di Trevi, Piazza di Spagna e jantar romântico.","energia":"Moderado","atividades":[{"horario":"09:30 – 10:15","nome":"Check-out e Hotel → Porto de Amalfi","descricao":"Check-out com calma. Shuttle ou táxi ao porto. Com mala grande, não recomendo caminhar. Confirmem o horário de shuttle na noite anterior.","dica":"","lat":40.634,"lng":14.6027},{"horario":"10:45 – 11:25","nome":"Ferry Amalfi → Salerno","descricao":"Saída mais bonita da Costa: evita a estrada sinuosa com mala. Comprem com antecedência e confirmem política de bagagem. Plano B: transfer privativo Amalfi → Salerno.","dica":"","lat":40.6743,"lng":14.7679},{"horario":"11:25 – 12:00","nome":"Porto de Salerno → Estação Salerno","descricao":"Táxi curto até a estação Salerno. Com calor e mala grande, o táxi compensa.","dica":"","lat":40.6707,"lng":14.7898},{"horario":"12:30 – 14:15","nome":"Trem Salerno → Roma Termini (Frecciarossa / Italo)","descricao":"Trem rápido para Roma. Reservem em categoria confortável (Prima/Business) com espaço para bagagem. Duração: ~1h40-2h.","dica":"","lat":41.9007,"lng":12.5015},{"horario":"14:15 – 14:45","nome":"Roma Termini → Hotel","descricao":"Táxi oficial. Base: Piazza di Spagna / Campo Marzio / Via Veneto / Centro Histórico. Hotéis sugeridos: Hotel de Russie, Portrait Roma, Hotel Eden, The First Roma Dolce ou Hotel Vilòn.","dica":"","lat":41.9096,"lng":12.4778},{"horario":"14:45 – 17:30","nome":"Check-in, Banho e Descanso","descricao":"Nada de agenda pesada. Deixem Coliseu e Vaticano para dias com mais energia.","dica":"","lat":41.9096,"lng":12.4778},{"horario":"17:30 – 18:30","nome":"Via Condotti, Via del Babuino e Cafés do Centro","descricao":"Região elegante: moda, vitrines, fotografia e referências de branding para as marcas Tailor's Mind e Ziv.","dica":"Se ficarem perto da Piazza di Spagna, esse trecho será todo a pé.","lat":41.9058,"lng":12.4788},{"horario":"18:30 – 20:00","nome":"Fontana di Trevi + Piazza di Spagna","descricao":"Primeira caminhada clássica por Roma. Para a Maria, é o impacto cinematográfico logo na chegada.","dica":"A Trevi fica cheia em agosto. Vale como primeiro contato; depois encaixem uma visita cedo em outro dia.","lat":41.9057,"lng":12.4823},{"horario":"20:30 – 22:30","nome":"Jantar Romântico em Roma","descricao":"Restaurante bonito, bem localizado, sem deslocamento longo. Reservem mesa com antecedência.","dica":"","lat":41.9057,"lng":12.4823}],"deslocamentos":["🚐 Hotel Amalfi → Porto: Shuttle ou táxi","⛴ Amalfi → Salerno: Ferry Travelmar · 35-45 min","🚗 Porto Salerno → Estação: Táxi · 5-10 min","🚄 Salerno → Roma Termini: Frecciarossa/Italo · ~1h40-2h · Prima/Business","🚗 Roma Termini → Hotel: Táxi oficial","💰 Total estimado do dia: R$ 736 – 1.699 por pessoa"]},{"num":8,"data":"2025-08-07","titulo":"Roma Clássica: Coliseu, Centro Histórico e Trastevere","resumo":"Primeiro dia inteiro em Roma: Coliseu, Fórum Romano, Pantheon, cafés, ruas históricas e jantar em Trastevere. Clássico, mas organizado para não virar maratona.","energia":"Moderado a Intenso","atividades":[{"horario":"08:15 – 08:45","nome":"Hotel → Coliseu (táxi)","descricao":"Saiam cedo. Agosto em Roma é quente — começar cedo faz muita diferença.","dica":"","lat":41.8902,"lng":12.4922},{"horario":"09:00 – 11:30","nome":"Coliseu + Fórum Romano + Palatino","descricao":"Ingresso reservado. Para a primeira vez da Maria, recomendo tour guiado privado ou grupo pequeno — Roma ganha muito com contexto. Levem garrafa de água.","dica":"","lat":41.8925,"lng":12.4853},{"horario":"11:30 – 12:00","nome":"Pausa para Café / Água / Sombra","descricao":"Saindo da área arqueológica, faça uma pausa curta antes de seguir.","dica":"","lat":41.8925,"lng":12.4853},{"horario":"12:00 – 13:00","nome":"Caminhada: Piazza Venezia / Via dei Fori Imperiali","descricao":"Região monumental com vistas fortes para ruínas, colunas e arquitetura romana. Ótimo para fotos amplas — sem ficar muito tempo no sol.","dica":"","lat":41.8955,"lng":12.4823},{"horario":"13:00 – 14:30","nome":"Almoço no Centro Histórico","descricao":"Entre Piazza Venezia, Pantheon ou Campo de' Fiori. Evitem restaurantes com cardápio turístico exposto e fotos de pratos na porta.","dica":"","lat":41.8955,"lng":12.472},{"horario":"14:45 – 15:30","nome":"Pantheon","descricao":"Uma das visitas mais impactantes de Roma. Reservem ingresso/horário se necessário.","dica":"","lat":41.8986,"lng":12.4769},{"horario":"15:30 – 16:15","nome":"Piazza Navona","descricao":"Uma das praças mais bonitas de Roma. Café, fotos e pausa visual.","dica":"","lat":41.8992,"lng":12.4731},{"horario":"16:15 – 17:30","nome":"Pausa no Hotel","descricao":"Banho, descanso e troca de roupa. Esse respiro evita que o jantar vire cansaço.","dica":"","lat":41.9096,"lng":12.4778},{"horario":"18:30 – 19:30","nome":"Passeio pelo Trastevere antes do Jantar","descricao":"Trastevere à noite: Roma mais boêmia, ruas estreitas, luz bonita. Cheguem antes do jantar para caminhar e fotografar.","dica":"","lat":41.8898,"lng":12.4695},{"horario":"20:00 – 22:15","nome":"Jantar em Trastevere","descricao":"Comida romana em ambiente charmoso. Reservem mesa — Trastevere fica cheio no verão.","dica":"","lat":41.8898,"lng":12.4695}],"deslocamentos":["🚗 Hotel → Coliseu: Táxi / metrô / a pé conforme hotel","🚶 Coliseu → Fórum → Palatino → Piazza Venezia → Pantheon → Piazza Navona: A pé","🚗 Centro → Hotel → Trastevere: Táxi · ~15-25 min","💰 Total estimado do dia: R$ 1.159 – 2.423 por pessoa"]},{"num":9,"data":"2025-08-08","titulo":"Roma → Amsterdam: Canais e Jordaan","resumo":"Vocês deixam Roma e seguem para Amsterdam: canais, cafés, design e lojas-conceito — contraste lindo com Costa Amalfitana e Roma.","energia":"Moderado","atividades":[{"horario":"08:30 – 09:15","nome":"Hotel Roma → Aeroporto Fiumicino","descricao":"Táxi/transfer por causa das malas. Cheguem com margem para bagagem despachada.","dica":"","lat":41.8003,"lng":12.2389},{"horario":"11:30 – 14:00","nome":"Voo Roma → Amsterdam","descricao":"Janela ideal: chegar até o meio da tarde. KLM ou ITA conforme melhor horário/tarifa. Duração ~2h30.","dica":"","lat":52.3086,"lng":4.7639},{"horario":"14:00 – 15:15","nome":"Chegada em Schiphol → Hotel em Amsterdam","descricao":"Sugestão: Jordaan, Canal Belt, De 9 Straatjes ou Museumplein. Táxi/transfer confortável com mala grande.","dica":"","lat":52.3738,"lng":4.8823},{"horario":"15:15 – 17:00","nome":"Check-in e Pausa no Hotel","descricao":"Banho e troca de roupa. Amsterdam é ótima para caminhar, mas calçadas, pontes e bicicletas exigem atenção.","dica":"","lat":52.3738,"lng":4.8823},{"horario":"17:00 – 18:30","nome":"Jordaan + De 9 Straatjes","descricao":"Canais, cafés, lojas independentes. Combina muito com as marcas: menos luxo óbvio, mais curadoria, branding e estética cotidiana.","dica":"","lat":52.3731,"lng":4.8836},{"horario":"18:30 – 19:30","nome":"Canais no Golden Hour","descricao":"Prinsengracht, Keizersgracht ou Herengracht. Excelente horário para fotos do casal e da cidade.","dica":"","lat":52.3745,"lng":4.8823},{"horario":"20:00 – 22:15","nome":"Jantar em Amsterdam (Jordaan ou Canal Belt)","descricao":"Sem deslocamento longo após o voo. Reservar é importante — agosto é alta temporada.","dica":"","lat":52.3738,"lng":4.8823}],"deslocamentos":["🚗 Hotel Roma → Aeroporto Fiumicino: Táxi/transfer · ~45-60 min","✈ Roma → Amsterdam: Voo direto · ~2h30","🚗 Schiphol → Hotel Amsterdam: Táxi ou trem Intercity Direct · ~20 min","💰 Total estimado do dia: R$ 1.418 – 3.191 por pessoa"]},{"num":10,"data":"2025-08-09","titulo":"Amsterdam: Arte, Canais, Cafés e Lojas-Conceito","resumo":"Dia inteiro em Amsterdam: arte, fotografia, cafés, design, canais e lojas independentes. Um museu principal e o restante do dia mais fluido.","energia":"Moderado","atividades":[{"horario":"09:00 – 09:30","nome":"Hotel → Museumplein (Tram ou Táxi)","descricao":"Ingressos com horário marcado — obrigatório em agosto.","dica":"","lat":52.3579,"lng":4.885},{"horario":"09:30 – 12:00","nome":"Rijksmuseum ou Van Gogh Museum (escolher um)","descricao":"Rijksmuseum: 9h-17h, €25. Van Gogh: 9h-18h, €25. Para a Maria: Van Gogh para emoção/arte direta; Rijksmuseum para impacto histórico e grandes mestres.","dica":"Ingresso com horário marcado — não se consegue entrar sem reserva prévia em agosto.","lat":52.36,"lng":4.8852},{"horario":"12:15 – 13:45","nome":"Almoço em De Pijp ou Museum Quarter","descricao":"De Pijp: cafés e restaurantes mais jovens e autênticos. Almoço leve e bom café.","dica":"","lat":52.3557,"lng":4.8942},{"horario":"14:00 – 15:30","nome":"De 9 Straatjes + Lojas-Conceito","descricao":"Lojas independentes, moda, acessórios, decoração e cafés. Excelente para referências de branding, curadoria e visual merchandising.","dica":"","lat":52.3731,"lng":4.8836},{"horario":"15:30 – 17:30","nome":"Café Especial + Jordaan / Canais","descricao":"Pausa em café bonito perto dos canais, seguida de caminhada lenta pelo Jordaan.","dica":"","lat":52.3738,"lng":4.8823},{"horario":"19:30 – 22:00","nome":"Jantar Final em Amsterdam","descricao":"Reservem e deixem a mala parcialmente pronta ao voltar.","dica":"","lat":52.3738,"lng":4.8823}],"deslocamentos":["🚊 Hotel → Museumplein: Tram linhas 2/5/12 ou táxi · ~10-15 min","🚶 Museumplein → De Pijp → De 9 Straatjes → Jordaan: A pé ou tram","💰 Total estimado do dia: R$ 857 – 1.625 por pessoa"]},{"num":11,"data":"2025-08-10","titulo":"Amsterdam → Düsseldorf de Trem e Noite Final","resumo":"Transição final: sair de Amsterdam com calma, trem direto para Düsseldorf e dormir perto do aeroporto do voo de retorno. Escolha segura, bonita e confortável.","energia":"Leve","atividades":[{"horario":"09:30 – 10:30","nome":"Check-out + Hotel → Amsterdam Centraal","descricao":"Check-out sem pressa. Com mala grande, táxi/transfer até a estação.","dica":"","lat":52.3791,"lng":4.8994},{"horario":"11:00 – 13:15","nome":"Trem ICE Direto: Amsterdam Centraal → Düsseldorf Hbf","descricao":"NS International: viagem em ~2h14, sem check-in de aeroporto.","dica":"Reservem 1ª classe ou assentos confortáveis por causa das malas. A partir de €35-90/pessoa.","lat":51.2199,"lng":6.7943},{"horario":"13:15 – 14:00","nome":"Düsseldorf Hbf → Hotel + Check-in","descricao":"Königsallee, Altstadt ou próximo ao aeroporto. Para o voo cedo, priorizem hotel próximo ao centro ou ao aeroporto.","dica":"","lat":51.2225,"lng":6.793},{"horario":"14:00 – 16:00","nome":"Pausa e Organização da Mala Final","descricao":"Banho e mala pronta. Separar tudo para o voo do dia seguinte cedo.","dica":"","lat":51.2225,"lng":6.793},{"horario":"16:00 – 17:30","nome":"Königsallee","descricao":"Caminhada leve pela Kö. Últimas compras, vitrines e referências de moda europeia.","dica":"","lat":51.2225,"lng":6.793},{"horario":"17:30 – 18:30","nome":"Rheinuferpromenade / Altstadt","descricao":"Caminhada curta à beira do Reno e pelo centro antigo. Ritmo leve.","dica":"","lat":51.2264,"lng":6.7735},{"horario":"19:30 – 21:30","nome":"Jantar Final em Düsseldorf","descricao":"Perto do hotel. Terminar cedo e dormir bem.","dica":"","lat":51.2225,"lng":6.793}],"deslocamentos":["🚗 Hotel Amsterdam → Amsterdam Centraal: Táxi · ~10-20 min","🚄 Amsterdam Centraal → Düsseldorf Hbf: Trem ICE · ~2h14","🚗 Düsseldorf Hbf → Hotel: Táxi · ~10 min / S11 para aeroporto · ~12 min","💰 Total estimado do dia: R$ 799 – 1.714 por pessoa"]},{"num":12,"data":"2025-08-11","titulo":"Düsseldorf → Amsterdam → São Paulo","resumo":"Dia de retorno: saída cedo, voo para Amsterdam e conexão para São Paulo em executiva KLM.","energia":"Leve","atividades":[{"horario":"05:45 – 06:10","nome":"Hotel Düsseldorf → Aeroporto de Düsseldorf","descricao":"Táxi/transfer reservado com antecedência. Trem S11 (~12 min do Hbf) como alternativa, mas táxi é mais confortável às 05:45 com mala grande.","dica":"Deixem documentos, cartões e etiquetas de bagagem prontos na noite anterior.","lat":51.2895,"lng":6.7668},{"horario":"06:10 – 07:30","nome":"Check-in, Segurança e Embarque","descricao":"Voo às 08h15 — chegar às 06h10-06h30 dá margem confortável para fila de check-in e segurança.","dica":"","lat":51.2895,"lng":6.7668},{"horario":"08:15 – 09:10","nome":"Voo Düsseldorf → Amsterdam Schiphol","descricao":"Primeiro trecho do retorno. Chegada em Schiphol às ~09h10.","dica":"","lat":52.3086,"lng":4.7639},{"horario":"09:10 – 13:00","nome":"Conexão em Amsterdam Schiphol","descricao":"Usem o lounge KLM se disponível conforme bilhete/status. Não saiam do aeroporto. Conexão de ~4h.","dica":"","lat":52.3086,"lng":4.7639},{"horario":"13:00 – 17:15","nome":"Voo Amsterdam → São Paulo (KLM Executiva)","descricao":"Chegada no Brasil às ~17h15. Ajustem sono e hidratação para reduzir cansaço pós-viagem.","dica":"","lat":-23.4356,"lng":-46.4731}],"deslocamentos":["🚗 Hotel → Aeroporto Düsseldorf: Táxi/transfer · ~20-25 min","✈ Düsseldorf → Amsterdam: Voo · ~55 min","✈ Amsterdam → São Paulo: KLM Executiva · ~10h15","💰 Total estimado do dia: R$ 106 – 236 por pessoa"]}],"documentos":[{"icon":"✈️","titulo":"Passagens Aéreas","meta":"GRU→MUC · CNF→GRU · FCO→AMS · MUC→NAP","badge":"Confirmado"},{"icon":"🏨","titulo":"Vouchers de Hotel","meta":"Grand Hotel Excelsior · Novotel Aeroporto De Dusseldorf · Movenpick Amsterdam City Centre · Mercure Roma Centro Colosseo · Mercure Hotel Muenchen City Center","badge":"Confirmado"},{"icon":"🚌","titulo":"Locação de Veículo","meta":"Deutsche Bahn, Positano Jet, Trenitalia, Travelmar","badge":"Confirmado"},{"icon":"🛂","titulo":"Passaportes","meta":"Maria Alice","badge":"Verificar validade","badgeClass":"pending"}],"_slug":"eurotrip-miguel-e-maria","footerNote":"Eurotrip - Miguel e Maria · Maria Alice"};

function rR(){if(typeof ROTEIRO_DATA==='undefined')return;var D=ROTEIRO_DATA;if(D.heroImage)document.getElementById('hero-img').style.backgroundImage="url('"+D.heroImage+"')";document.getElementById('hero-eyebrow').textContent=D.eyebrow||'Travel Concierge';document.getElementById('hero-title').innerHTML=(D.titulo||'').replace(' & ','<br>');document.getElementById('hero-subtitle').textContent=D.subtitulo||'';document.getElementById('hero-pills').innerHTML=(D.pills||[]).map(function(p){return'<span class="pill">'+p+'</span>';}).join('');var nl=[['#visao-geral','Visão Geral']].concat(D.voos&&D.voos.length?[['#voos','Voos']]:[]).concat(D.hospedagem&&D.hospedagem.length?[['#hospedagem','Hotel']]:[]).concat(D.servicos&&D.servicos.length?[['#servicos','Serviços']]:[]).concat(D.dias&&D.dias.length?[['#roteiro','Roteiro']]:[]).concat(D.documentos&&D.documentos.length?[['#documentos','Documentos']]:[]);document.getElementById('topbar-nav').innerHTML=nl.map(function(n){return'<a href="'+n[0]+'">'+n[1]+'</a>';}).join('');var cards=D.visaoGeral||[];document.getElementById('overview-grid').innerHTML=cards.map(function(c){return'<div class="info-card '+(c.variant||'')+'"><span class="info-card-label">'+c.label+'</span><span class="info-card-value">'+c.value+'</span></div>';}).join('');if(D.obs){document.getElementById('obs-box').style.display='';document.getElementById('obs-text').innerHTML=D.obs;}if(D.voos&&D.voos.length){document.getElementById('voos').style.display='';document.getElementById('voos-container').innerHTML=D.voos.slice().sort(function(a,b){return((a.data||'')+' '+(a.horaPartida||'')).localeCompare((b.data||'')+' '+(b.horaPartida||''));}).map(bVC).join('');}if(D.hospedagem&&D.hospedagem.length){document.getElementById('hospedagem').style.display='';document.getElementById('hr-hospedagem').style.display='';document.getElementById('hospedagem-container').innerHTML=D.hospedagem.slice().sort(function(a,b){return(a.checkin||'').localeCompare(b.checkin||'');}).map(bHC).jo {if(!existingIds.has(ex.docId))_docsList.push(ex);}_docsUploadados={};Object.entries(meta).forEach(function(entry){const fileName=entry[0];const info=entry[1];if(fileName.indexOf('_')===0)return;const fileId=fileName.replace(/\.[^.]+$/,'');const docId=fileId.replace(/_\d+$/,'');const rawUrl='https://raw.githubusercontent.com/davileles/roteiros/main/'+slug+'/docs/'+fileName;if(!_docsUploadados[docId])_docsUploadados[docId]=[];if(!_docsUploadados[docId].some(function(x){return x.fileId===fileId;}))_docsUploadados[docId].push({nome:info.nome||fileName,rawUrl:rawUrl,mediaType:info.mediaType||'',fileId:fileId});});_redrawDocs();}function renderDocCards(documentos){_docsList=documentos.map(function(doc,i){return Object.assign({},doc,{docId:doc.docId||('doc_'+i)});});_redrawDocs();const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(slug)carregarDocsUpload(slug);}function triggerUpload(docId){const el=document.getElementById('input-'+docId);if(el)el.click();}async function handleDocUpload(docId,nomeDoc,input){const file=input.files&&input.files[0];if(!file)return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(!slug){alert('Slug do roteiro nao definido.');return;}const maxMB=8;if(file.size>maxMB*1024*1024){alert('Arquivo muito grande. Maximo '+maxMB+'MB.');input.value='';return;}const ext=file.name.split('.').pop().toLowerCase();const fileId=docId+'_'+Date.now();const fileName=fileId+'.'+ext;document.getElementById('uploading-'+docId).style.display='';try{const b64=await new Promise(function(res,rej){const r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});const resp=await fetch(PROXY+'/roteiros/doc-upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug,docId:fileName,nome:file.name,tipo:ext,base64:b64,mediaType:file.type})});const data=await resp.json();if(!data.ok)throw new Error(data.erro||'Erro no upload');if(!_docsUploadados[docId])_docsUploadados[docId]=[];_docsUploadados[docId].push({nome:file.name,rawUrl:data.rawUrl,mediaType:file.type,fileId:fileId});document.getElementById('uploading-'+docId).style.display='none';document.getElementById('upload-status-'+docId).innerHTML=_fileListHtml(docId);}catch(e){alert('Erro ao enviar arquivo: '+e.message);document.getElementById('uploading-'+docId).style.display='none';}input.value='';}async function removerDocArquivo(docId,fi){const files=_docsUploadados[docId]||[];const f=files[fi];if(!f)return;if(!confirm('Remover "'+f.nome+'"?'))return;_docsUploadados[docId].splice(fi,1);document.getElementById('upload-status-'+docId).innerHTML=_fileListHtml(docId);const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(!slug)return;const ext=f.rawUrl.split('.').pop().toLowerCase();const fileName=f.fileId+'.'+ext;try{await fetch(PROXY+'/roteiros/doc-upload',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug,docId:fileName})});}catch(e){}}async function removerDocCard(docId){if(!confirm('Remover este cartao de documento?'))return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;_docsList=_docsList.filter(function(d){return d.docId!==docId;});delete _docsUploadados[docId];_redrawDocs();if(!slug)return;const meta=await _metaGet(slug);const deleted=new Set(meta._deletedCards||[]);deleted.add(docId);const extras=(meta._extraCards||[]).filter(function(e){return e.docId!==docId;});meta._deletedCards=Array.from(deleted);meta._extraCards=extras;await _metaSave(slug,meta);}async function adicionarDocCard(){const titulo=prompt('Nome do documento:');if(!titulo)return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;const newId='doc_extra_'+Date.now();const novoCard={docId:newId,icon:'📄',titulo:titulo,meta:'Adicionado manualmente',badge:''};_docsList.push(novoCard);_redrawDocs();if(!slug)return;const meta=await _metaGet(slug);meta._extraCards=(meta._extraCards||[]).concat([novoCard]);await _metaSave(slug,meta);}function mostrarDocAnexado(docId){}async function removerDoc(docId){await removerDocArquivo(docId,0);}
