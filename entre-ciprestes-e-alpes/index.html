 câmera — o fim de tarde aqui é fotográfico demais."},{"horario":"18h00 – 19h00","nome":"Descanso no hotel","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar especial","descricao":"Se hospedados no The Yeatman: o restaurante do hotel tem estrela Michelin e vista noturna deslumbrante — experiência imperdível para a primeira noite. Reserva obrigatória. ~€120-180 por pessoa. Alternativa: DOP do chef Rui Paula, no centro histórico — cozinha portuguesa contemporânea. ~€60-90 por pessoa.","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Transfer aeroporto</span><span>€12</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Visita + degustação caves</span><span>€30</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço</span><span>€25</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar (The Yeatman)</span><span>€150</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Extras/café</span><span>€15</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€230</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Café Santiago</strong> — tradicional | A francesinha original de Porto | ~€15-20 por pessoa</div><div style='margin-bottom:6px'><strong>The Yeatman Restaurant</strong> — alta gastronomia | Vista noturna + estrela Michelin | ~€150 por pessoa</div><div style='margin-bottom:6px'><strong>DOP</strong> — portuguesa contemporânea | Chef premiado, ambiente elegante | ~€70 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Caves Graham's: grahams1820.com · Reservas The Yeatman: theyeatman.com · Transfer aeroporto: uber.com ou táxi fixo no aeroporto","dica":""}],"deslocamentos":["Aeroporto → Hotel: Uber/táxi, ~25 min, ~€25","Hotel → Ribeira: a pé (se Ribeira) ou Uber (~€8)","Ribeira → Caves Gaia: a pé pela Ponte Dom Luís, ~15 min"]},{"num":2,"data":"2026-08-18","titulo":"Porto → Roma: Chegada e Primeiro Sabor","resumo":"Manhã tranquila em Porto para um último café e passeio leve antes do voo das 14h45. Chegam em Roma ao fim da tarde — tempo suficiente para se instalar, caminhar pelo bairro do hotel e jantar bem. Roma não é o foco da viagem, então nada de correria: a cidade é o ponto de partida para a estrada.","energia":"🟢 Leve","atividades":[{"horario":"⚠️","nome":"Atenção","descricao":"VOOS RYANAIR: Check-in online obrigatório (abre 60 dias antes, fecha 2h antes do embarque). Confirmar bagagem despachada com antecedência — taxas altas no aeroporto. Aeroporto de Porto (OPO) recomenda chegada 2h antes.","dica":""},{"horario":"08h00 – 10h00","nome":"Café da manhã e passeio final em Porto","descricao":"Último café com pastel de nata. Se o hotel for na Ribeira, um passeio matinal tranquilo antes de preparar as malas.","dica":""},{"horario":"10h30","nome":"Check-out e transfer para aeroporto","descricao":"Uber/táxi: ~25 min, ~€25. Chegada ao aeroporto ~12h30, confortável para voo 14h45.","dica":""},{"horario":"14h45","nome":"Voo Porto → Roma (Ryanair)","descricao":"","dica":"Ryanair opera no Aeroporto de Ciampino (CIA) em Roma — confirmar no bilhete, não é Fiumicino!"},{"horario":"18h40","nome":"Chegada em Roma (Ciampino)","descricao":"Transfer Ciampino → hotel: ~45 min, ~€35-50 de táxi fixo. Existe também ônibus Terravision (~€6/pessoa) mas táxi é mais confortável.","dica":""},{"horario":"20h00 – 21h00","nome":"Instalação no hotel + banho","descricao":"","dica":""},{"horario":"21h00","nome":"Jantar próximo ao hotel","descricao":"Roma tem uma oferta gastronômica incrível. Um jantar leve e sem pressa para a chegada.","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Transfer Porto → aeroporto</span><span>€12</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Bagagem Ryanair (se necessário)</span><span>€30-50</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Transfer Roma → hotel</span><span>€20</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar chegada</span><span>€45</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€110-130</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos (Roma — jantar de chegada)","descricao":"<div style='margin-bottom:6px'><strong>La Pergola</strong> — alta gastronomia | 3 estrelas Michelin, vista panorâmica de Roma | ~€200+ por pessoa (reserva com meses de antecedência)</div><div style='margin-bottom:6px'><strong>Osteria dell'Enoteca</strong> — italiana clássica | Ambiente acolhedor, boa carta de vinhos | ~€50-70 por pessoa</div><div style='margin-bottom:6px'><strong>Il Sorpasso</strong> — moderna e descontraída | Ótimo para uma chegada sem cerimônia | ~€30-40 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Check-in Ryanair: ryanair.com · Ônibus Ciampino: terravision.eu · Táxi fixo Roma: táxi no balcão do aeroporto","dica":""}],"deslocamentos":["Hotel Porto → Aeroporto OPO: Uber, ~25 min, ~€25","Aeroporto CIA Roma → Hotel: táxi fixo, ~45 min, ~€40"]},{"num":3,"data":"2026-08-19","titulo":"Roma: Dia Extra — Coliseu, Fontana di Trevi e Trastevere","resumo":"Um dia a mais em Roma, aproveitado com calma. Roma não é o foco da viagem, mas já que o casal decidiu ficar mais uma noite, vale conhecer os clássicos imperdíveis: o Coliseu pela manhã, o coração histórico à tarde e Trastevere para jantar à noite — um roteiro compacto, tudo a pé ou de metrô, sem pressa.","energia":"🟡 Moderado","atividades":[{"horario":"08h30","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"09h30 – 12h30","nome":"Coliseu e Fórum Romano","descricao":"O símbolo máximo da Roma Antiga. A visita combinada (Coliseu + Fórum + Palatino) leva ~3h com calma. Ingresso com horário marcado é obrigatório.","dica":"Reservar com antecedência em coopculture.it — ingressos esgotam rápido em agosto. Chegar 15 min antes do horário marcado. Levar água e chapéu, o sol da manhã já é forte."},{"horario":"13h00","nome":"Almoço perto do Monti","descricao":"O bairro Monti, ao lado do Coliseu, tem trattorias autênticas e menos turísticas que o entorno imediato dos pontos turísticos.","dica":""},{"horario":"14h30 – 17h00","nome":"Centro histórico a pé — Pantheon, Fontana di Trevi e Piazza Navona","descricao":"Trajeto clássico e compacto, tudo a poucos minutos a pé: o Pantheon (entrada gratuita, arquitetura romana intacta), a Fontana di Trevi (chegar cedo ou ao entardecer evita a multidão do meio-dia) e a Piazza Navona, com suas fontes barrocas de Bernini.","dica":"Jogar uma moeda na Fontana di Trevi de costas, com a mão direita sobre o ombro esquerdo — a tradição garante o retorno a Roma."},{"horario":"17h30","nome":"Descanso no hotel","descricao":"","dica":""},{"horario":"19h30","nome":"Trastevere — jantar e passeio noturno","descricao":"O bairro mais charmoso de Roma à noite: ruelas de paralelepípedo, trattorias tradicionais e uma atmosfera boêmia. Ideal para encerrar a passagem por Roma com uma refeição memorável.","dica":"Chegar por volta das 19h30 para conseguir mesa sem espera nos lugares mais concorridos."},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Coliseu + Fórum + Palatino</span><span>€24</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Monti</span><span>€30</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Café/extras centro histórico</span><span>€15</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Trastevere</span><span>€60</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€130</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Trattoria Monti</strong> — Monti | Cozinha regional simples, perto do Coliseu | ~€30-40 por pessoa</div><div style='margin-bottom:6px'><strong>Da Enzo al 29</strong> — Trastevere | Clássico romano, cacio e pepe imperdível, reserva recomendada | ~€35-50 por pessoa</div><div style='margin-bottom:6px'><strong>Roma Sparita</strong> — Trastevere | Famoso pela carbonara servida na casca de parmesão | ~€40-55 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Ingressos Coliseu: coopculture.it · Mapa de Roma a pé: centro histórico é 100% caminhável entre Pantheon, Trevi e Navona","dica":""}],"deslocamentos":["Hotel → Coliseu: metrô (linha B, estação Colosseo) ou a pé, ~20 min","Coliseu → Pantheon: a pé, ~20 min","Centro histórico → Trastevere: a pé pela Ponte Sisto, ~15 min"]},{"num":4,"data":"2026-08-20","titulo":"Roma → Toscana: A Estrada Recomeça","resumo":"Manhã final livre em Roma e check-out no início da tarde. A estrada até a Toscana já é parte do passeio — paisagens que vão mudando até chegar nos cartões-postais de ciprestes e colinas douradas da Val d'Orcia. Chegada ao agriturismo ao entardecer, instalação com calma e primeira taça de vinho local.","energia":"🟢 Leve","atividades":[{"horario":"09h00","nome":"Café da manhã e manhã livre no hotel","descricao":"Última manhã em Roma — malas prontas, sem compromisso.","dica":""},{"horario":"10h30","nome":"Retirada do carro em Roma","descricao":"Retirar próximo ao hotel ou centro. Devolver no norte da Itália antes do trem para a Suíça.","dica":"Hertz, Avis ou Europcar — reservar com antecedência. Para dois, um carro compacto-confortável (categoria C ou D) é suficiente. Evitar SUV grande nas vielas medievais da Toscana. Verificar cobertura de seguro completa — estradas de terra (strade bianche) são comuns na região."},{"horario":"12h00","nome":"Check-out e almoço leve em Roma","descricao":"Check-out ao meio-dia. Almoço rápido antes da estrada — algo leve, sem pressa demais.","dica":""},{"horario":"13h00","nome":"Saída de Roma rumo à Toscana","descricao":"Rota sugerida: Roma → A1 (Autostrada del Sole) → saída Chiusi/Chianciano → Val d'Orcia. ~2h30 de viagem (~220 km).","dica":""},{"horario":"15h30","nome":"Parada rápida em Bagno Vignoni","descricao":"Vilarejo minúsculo e absolutamente único — sua praça central é uma piscina termal histórica do século XVI, em vez de uma praça comum. Fica direto no caminho, vale uma parada curta para fotos.","dica":"Com a saída mais tarde, o tempo aqui é mais enxuto — ~20-30 min já valem a pena. Não é possível banhar na piscina histórica."},{"horario":"16h30","nome":"Check-in no agriturismo","descricao":"","dica":""},{"horario":"18h00 – 20h00","nome":"Instalação e primeira taça de vinho local","descricao":"Tempo para descansar da viagem e aproveitar o entardecer na Val d'Orcia — a luz dourada do fim de tarde sobre os ciprestes é um dos cartões-postais mais fotografados da Itália.","dica":""},{"horario":"20h30","nome":"Jantar no agriturismo","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Aluguel de carro (~14 dias, dividido por 2)</span><span>~€35/dia</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Pedágios Roma → Toscana</span><span>€10</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço leve em Roma</span><span>€20</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar no agriturismo</span><span>€50</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€115</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurante do Adler Thermae</strong> — no próprio hotel | Cozinha regional refinada | ~€60-80 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Aluguel carro: hertz.it / europcar.it · Adler Thermae: adler-resorts.com","dica":""}],"deslocamentos":["Roma → Val d'Orcia: carro, ~2h30, ~€20 de pedágio","Agriturismo → Bagno Vignoni: carro, ~10 min"]},{"num":5,"data":"2026-08-21","titulo":"Val d'Orcia: Ciprestes, Bicicleta e Brunello","resumo":"O dia mais icônico da Toscana. De manhã, um passeio de bicicleta pelas estradas de terra entre ciprestes e colinas — as famosas strade bianche. À tarde, uma visita a uma cantina de Brunello di Montalcino para degustação. Jantar ao pôr do sol com vista para o vale que parece uma pintura renascentista.","energia":"🟡 Moderado","atividades":[{"horario":"08h00","nome":"Café da manhã no agriturismo","descricao":"","dica":""},{"horario":"09h00 – 11h30","nome":"Passeio de bicicleta — Strade Bianche","descricao":"As estradas de terra branca entre San Quirico d'Orcia e Montichiello são um dos cenários mais fotografados da Toscana. Percurso leve de ~15-20 km (ida e volta) com paradas para fotos.","dica":"O próprio agriturismo costuma ter bicicletas para hóspedes ou indica locadora próxima. Sair cedo para evitar o calor de agosto (~32°C no meio do dia). Levar água e protetor solar."},{"horario":"12h00","nome":"Montichiello","descricao":"Vilarejo medieval minúsculo no topo da colina, quase intacto. Almoço com vista panorâmica para o vale.","dica":""},{"horario":"14h30 – 17h00","nome":"Degustação de Brunello em Montalcino","descricao":"Montalcino fica a ~25 min de carro. O Brunello di Montalcino é um dos maiores vinhos da Itália. Já que conhecem a região, desta vez vale uma experiência mais aprofundada numa cantina premium.","dica":"Biondi-Santi é a cantina histórica — berço do Brunello. Banfi ou Casanova di Neri oferecem visitas guiadas com degustação premium. Reservar com antecedência. ~€40-80 por pessoa."},{"horario":"17h30","nome":"Fortaleza de Montalcino","descricao":"Vista de 360° sobre a Val d'Orcia. Entrada ~€5. Enoteca dentro da fortaleza para mais uma taça antes de voltar.","dica":""},{"horario":"19h30","nome":"Retorno ao agriturismo","descricao":"","dica":""},{"horario":"20h30","nome":"Jantar","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Aluguel de bicicleta (se necessário)</span><span>€15-20</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Montichiello</span><span>€35</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Degustação Brunello</span><span>€60</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Entrada Fortaleza</span><span>€5</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar</span><span>€50</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€165</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Osteria La Porta</strong> — Montichiello | Vista deslumbrante, cozinha local autêntica | ~€40-50 por pessoa</div><div style='margin-bottom:6px'><strong>Re di Macchia</strong> — Montalcino | Especialidade em carnes e Brunello | ~€45-60 por pessoa</div><div style='margin-bottom:6px'><strong>Ristorante Banfi</strong> — cantina Banfi | Jantar entre vinhedos, experiência completa | ~€70-90 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Biondi-Santi: biondisanti.it · Casanova di Neri: casanovadineri.com · Banfi: castellobanfi.com","dica":""}],"deslocamentos":["Agriturismo → Montichiello: bicicleta ou carro, ~20 min","Agriturismo → Montalcino: carro, ~25 min"]},{"num":6,"data":"2026-08-22","titulo":"Pienza, San Quirico e Siena","resumo":"Um dia mais cheio, combinando os vilarejos renascentistas ao redor da base com a grande cidade medieval da região. Pienza e San Quirico d'Orcia pela manhã, com calma — queijos, lojas artesanais e os jardins renascentistas. À tarde, Siena: a Piazza del Campo, a Catedral e os bairros históricos, sem precisar entrar em museu nenhum.","energia":"🟡 Moderado","atividades":[{"horario":"08h30","nome":"Café da manhã no agriturismo","descricao":"","dica":""},{"horario":"09h30 – 11h00","nome":"Pienza com calma","descricao":"Explorar o Corso Rossellino, entrar nas lojas de pecorino, azeite e mel artesanal. A Catedral e a Piazza Pio II merecem atenção pela arquitetura renascentista impecável.","dica":"Comprar pecorino stagionato e pecorino al tartufo direto dos produtores locais — ótima lembrança comestível. Chegue antes das 10h para evitar grupos de turistas."},{"horario":"11h15 – 12h00","nome":"Horti Leonini — San Quirico d'Orcia","descricao":"Jardins renascentistas do século XVI no centro do vilarejo — entrada gratuita, absolutamente serenos. Perfeito para uma caminhada leve e fotos antes de seguir para Siena.","dica":""},{"horario":"12h30","nome":"Almoço leve em San Quirico","descricao":"Almoço rápido antes da estrada para Siena.","dica":""},{"horario":"13h30","nome":"Trajeto até Siena (carro, ~50 min)","descricao":"","dica":""},{"horario":"14h30 – 16h30","nome":"Piazza del Campo e centro histórico","descricao":"A piazza em forma de concha é o coração de Siena — simplesmente sentar e contemplar já vale a visita. Ao redor, palácios medievais e a Torre del Mangia (subir é opcional — ~230 degraus, vista panorâmica).","dica":"Estacionar no Parcheggio Il Campo ou Stadio (estacionamentos externos — o centro é fechado para carros). ~€2-3/hora."},{"horario":"16h30","nome":"Catedral de Siena (Duomo)","descricao":"Uma das mais belas fachadas góticas da Itália — por fora já impressiona muito. Entrar vale pela arquitetura interior única, com pavimento de mármores incrustados.","dica":"Entrada ~€8. Não é museu — é arquitetura pura."},{"horario":"17h30 – 18h30","nome":"Passeio pelos bairros (contrade)","descricao":"Siena é dividida em 17 bairros históricos chamados contrade — cada um com sua identidade, fonte e igreja. Caminhar sem mapa por essas ruelas é uma experiência única para fechar a tarde.","dica":""},{"horario":"19h00","nome":"Jantar em Siena antes do retorno","descricao":"","dica":""},{"horario":"20h30","nome":"Retorno ao agriturismo (carro, ~50 min)","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Compras locais (queijos, azeite)</span><span>€30</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço leve San Quirico</span><span>€20</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Estacionamento Siena</span><span>€8</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Catedral</span><span>€8</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar em Siena</span><span>€45</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€111</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Latte di Luna</strong> — Pienza | Pasta caseira e pecorino fresco | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Osteria Le Logge</strong> — Siena | Clássico elegante, favorito dos locais, reserva recomendada | ~€50-65 por pessoa</div><div style='margin-bottom:6px'><strong>Trattoria Papei</strong> — Siena | Perto da Piazza del Campo, simples e autêntico | ~€25-35 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Duomo de Siena: operaduomo.siena.it · Estacionamentos: sienaparcheggi.it","dica":""}],"deslocamentos":["Agriturismo → Pienza: carro, ~15 min","Pienza → San Quirico: carro, ~10 min","San Quirico → Siena: carro, ~50 min","Siena → Agriturismo: carro, ~50 min"]},{"num":7,"data":"2026-08-23","titulo":"Estrada do Chianti: Vinhedos até Florença","resumo":"Último dia de base na Val d'Orcia — check-out e partida rumo a Florença pela famosa Chiantigiana (SS222), a estrada do vinho que corta os vinhedos do Chianti entre Siena e Florença. Uma das drives mais bonitas da Itália. Paradas em cantinas e vilarejos pelo caminho, chegando a Florença no fim da tarde para se instalar antes do casamento.","energia":"🟢 Leve-Moderado","atividades":[{"horario":"08h00","nome":"Café da manhã e check-out","descricao":"","dica":""},{"horario":"09h00","nome":"Saída rumo ao Chianti pela SS222","descricao":"A Chiantigiana é uma estrada secundária sinuosa entre vinhedos, olivais e castelos medievais. Não tem pressa — essa é a viagem.","dica":""},{"horario":"10h00","nome":"Greve in Chianti","descricao":"Principal cidade da região, com uma praça triangular charmosa e ótimas enotecas. Vale uma parada para café e compras de vinho.","dica":"Enoteca Falorni é uma das mais tradicionais do Chianti — degustação de vinhos e embutidos locais. ~€20-30 por pessoa."},{"horario":"11h30","nome":"Castello di Brolio","descricao":"Castelo medieval da família Ricasoli — criadores históricos do Chianti Classico. Vista deslumbrante sobre os vinhedos. Visita ao jardim e enoteca.","dica":"Não precisa fazer tour interno — o jardim e a vista já valem a parada. Entrada jardim ~€5. Reservar degustação na cantina com antecedência."},{"horario":"13h00","nome":"Almoço em Panzano in Chianti","descricao":"Panzano tem o famoso Dario Cecchini — o açougueiro mais famoso da Itália, com restaurante e experiência gastronômica única.","dica":"Solociccia de Dario Cecchini é uma experiência e meia — reserva obrigatória com semanas de antecedência. ~€50-60 por pessoa."},{"horario":"15h00","nome":"Continuação rumo a Florença (~45 min pela SS222)","descricao":"","dica":""},{"horario":"16h00","nome":"Chegada e check-in em Florença","descricao":"","dica":""},{"horario":"17h00 – 19h00","nome":"Instalação e descanso","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar tranquilo em Florença","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Degustação Enoteca Falorni</span><span>€25</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Entrada Castello di Brolio</span><span>€5</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Panzano (Dario Cecchini)</span><span>€55</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Compras de vinho pelo caminho</span><span>€30-50</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Florença</span><span>€55</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€155</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Solociccia</strong> — Panzano | Dario Cecchini, experiência única de carne toscana | ~€50-60/pessoa (reserva obrigatória)</div><div style='margin-bottom:6px'><strong>Buca Mario</strong> — Florença | O restaurante mais antigo de Florença | ~€45-55 por pessoa</div><div style='margin-bottom:6px'><strong>Il Latini</strong> — Florença | Mesas compartilhadas, ambiente animado, toscana raiz | ~€35-45 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Dario Cecchini reservas: dariocecchini.com · Enoteca Falorni: falorni.it · Castello di Brolio: ricasoli.com","dica":""}],"deslocamentos":["Agriturismo → Greve in Chianti: carro, ~50 min","Greve → Castello di Brolio: carro, ~20 min","Brolio → Panzano/Radda: carro, ~15 min","Panzano → Florença: carro, ~45 min"]},{"num":8,"data":"2026-08-24","titulo":"Florença — Agenda Livre (Casamento)","resumo":"Dias reservados ao casamento e seus desdobramentos sociais. Nenhuma sugestão de passeio — Oswaldo e Mônica têm compromisso especial. Aproveitar a manhã com calma no hotel, café tranquilo, e se preparar para a celebração.","energia":"🎉 Agenda Livre","atividades":[{"horario":"🎉","nome":"Agenda Livre — Casamento","descricao":"Esse dia está reservado para o casamento e seus desdobramentos sociais. O roteiro retoma no Dia 11 — 27 de agosto, com a partida de Florença rumo ao norte da Itália.","dica":""},{"horario":"💡","nome":"Sugestão para os momentos livres","descricao":"Aproveitar os momentos livres para descansar, explorar Florença no próprio ritmo ou participar dos eventos do casamento sem compromisso de agenda. Florença tem muito a oferecer sem precisar entrar em museu nenhum — as pontes sobre o Arno, o bairro Oltrarno, o Mercato Centrale com seus produtos locais, sorveterias premiadas e cafés históricos como o Caffè Rivoire na Piazza della Signoria.","dica":"Giardino di Boboli (jardins do Palazzo Pitti) é perfeito para um passeio leve ao ar livre. Entrada ~€10."},{"horario":"🍽️","nome":"Restaurantes em Florença para os dias livres","descricao":"<div style='margin-bottom:6px'><strong>Buca Mario</strong> — o mais antigo de Florença, cozinha tradicional | ~€45-55 por pessoa</div><div style='margin-bottom:6px'><strong>Il Latini</strong> — mesas compartilhadas, ambiente animado e toscano | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Osteria dell'Enoteca</strong> — elegante, boa carta de vinhos | ~€60-80 por pessoa</div><div style='margin-bottom:6px'><strong>Buca dell'Orafo</strong> — à beira do Arno, junto à Ponte Vecchio | ~€50-65 por pessoa</div>","dica":""}],"deslocamentos":[]},{"num":9,"data":"2026-08-25","titulo":"Florença — Agenda Livre (Casamento)","resumo":"Dias reservados ao casamento e seus desdobramentos sociais. Nenhuma sugestão de passeio — Oswaldo e Mônica têm compromisso especial. Aproveitar a manhã com calma no hotel, café tranquilo, e se preparar para a celebração.","energia":"🎉 Agenda Livre","atividades":[{"horario":"🎉","nome":"Agenda Livre — Casamento","descricao":"Esse dia está reservado para o casamento e seus desdobramentos sociais. O roteiro retoma no Dia 11 — 27 de agosto, com a partida de Florença rumo ao norte da Itália.","dica":""},{"horario":"💡","nome":"Sugestão para os momentos livres","descricao":"Aproveitar os momentos livres para descansar, explorar Florença no próprio ritmo ou participar dos eventos do casamento sem compromisso de agenda. Florença tem muito a oferecer sem precisar entrar em museu nenhum — as pontes sobre o Arno, o bairro Oltrarno, o Mercato Centrale com seus produtos locais, sorveterias premiadas e cafés históricos como o Caffè Rivoire na Piazza della Signoria.","dica":"Giardino di Boboli (jardins do Palazzo Pitti) é perfeito para um passeio leve ao ar livre. Entrada ~€10."},{"horario":"🍽️","nome":"Restaurantes em Florença para os dias livres","descricao":"<div style='margin-bo adas, ambiente animado e toscano | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Osteria dell'Enoteca</strong> — elegante, boa carta de vinhos | ~€60-80 por pessoa</div><div style='margin-bottom:6px'><strong>Buca dell'Orafo</strong> — à beira do Arno, junto à Ponte Vecchio | ~€50-65 por pessoa</div>","dica":""}],"deslocamentos":[]},{"num":11,"data":"2026-08-27","titulo":"Florença → Lago di Como: o Norte Começa","resumo":"Fim do casamento, começo de uma nova etapa. Saída de Florença rumo ao norte, com destino ao Lago di Como — um dos cenários mais românticos da Europa. A viagem de carro pelo interior é bonita e sem stress. Chegada ao lago no fim da tarde, passeio à beira d'água e jantar com vista.","energia":"🟢 Leve","atividades":[{"horario":"08h30","nome":"Café da manhã e check-out","descricao":"","dica":""},{"horario":"09h30","nome":"Saída de Florença rumo a Como","descricao":"Rota pela A1 e A8 — ~3h de viagem (~300 km). Com bagagem grande, ir direto sem paradas intermediárias.","dica":""},{"horario":"13h00","nome":"Parada para almoço em rota","descricao":"","dica":""},{"horario":"15h30","nome":"Chegada à região do Lago di Como","descricao":"","dica":""},{"horario":"16h00","nome":"Check-in no hotel","descricao":"","dica":""},{"horario":"17h30 – 19h00","nome":"Passeio de barco pelo lago (~1h)","descricao":"Os táxis-barco (motoscafi) são o transporte clássico do lago. Um passeio de ~1h pela água, vendo as vilas históricas e os jardins à beira do lago.","dica":"Negociar diretamente com os barqueiros no cais — ~€80-120 por barco/hora. Não é por pessoa."},{"horario":"20h00","nome":"Jantar à beira do lago","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Pedágios</span><span>€13</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço em rota</span><span>€30</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Passeio de barco</span><span>€50</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar</span><span>€65</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€158</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Ristorante Imperialino</strong> — Moltrasio | Vista para o lago, frutos do mar frescos | ~€60-80 por pessoa</div><div style='margin-bottom:6px'><strong>La Darsena</strong> — Tremezzo | Simples e autêntico, direto à beira da água | ~€40-55 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurante Grand Hotel Tremezzo</strong> — no hotel | Jantar romântico com vista para Bellagio | ~€80-100 por pessoa</div>","dica":""}],"deslocamentos":["Florença → Como: carro, ~3h, ~€25 pedágios","Locomoção no lago: barco-táxi ou ferry público (~€5-15 por trecho)"]},{"num":12,"data":"2026-08-28","titulo":"Lago di Como: Bellagio e Varenna","resumo":"Um dia inteiro para explorar o lago — de barco entre seus vilarejos mais charmosos. Bellagio é o cartão-postal absoluto, com suas ruas em escadaria e jardins floridos. Varenna é mais tranquila e igualmente encantadora. Ritmo lento, ferry, café à beira d'água, compras artesanais e pôr do sol inesquecível.","energia":"🟢 Leve","atividades":[{"horario":"08h00","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"09h30","nome":"Ferry para Bellagio","descricao":"O ferry público conecta os principais pontos do lago — econômico e charmoso. Bellagio fica ~20-30 min de ferry de Tremezzo.","dica":"Ferry público ~€5-8 por trecho. Horários em navigazionelaghi.it"},{"horario":"10h00 – 13h00","nome":"Bellagio — 'A Pérola do Lago'","descricao":"Ruelas em escadaria, flores nas sacadas, lojas de seda artesanal e vistas de 360° do promontório. Visitar os Jardins de Villa Melzi (entrada ~€8) — entre os mais bonitos do lago.","dica":"Chegando antes das 10h evitam o pico de turistas. Subir até o alto do vilarejo pela Salita Serbelloni para a melhor vista."},{"horario":"13h00","nome":"Almoço em Bellagio","descricao":"","dica":""},{"horario":"14h30","nome":"Ferry para Varenna (~15 min)","descricao":"Do outro lado do lago. Varenna é mais reservada e menos turística que Bellagio.","dica":""},{"horario":"15h00 – 17h00","nome":"Varenna — Passeggiata degli Innamorati","descricao":"O calçadão dos namorados à beira d'água. Villa Monastero com seus jardins botânicos à beira do lago (~€5 entrada).","dica":"Varenna tem um charme mais íntimo — ótima para um café tranquilo e fotos sem multidão."},{"horario":"17h30","nome":"Retorno de ferry ao hotel","descricao":"","dica":""},{"horario":"19h00","nome":"Fim de tarde no hotel — piscina ou spa","descricao":"","dica":""},{"horario":"20h30","nome":"Jantar especial — última noite no lago","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Ferries do dia</span><span>€20</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jardins Villa Melzi</span><span>€8</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Villa Monastero</span><span>€5</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Bellagio</span><span>€45</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar</span><span>€70</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€148</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Ristorante Bilacus</strong> — Bellagio | Tradicional, vista para o lago, reserva recomendada | ~€50-65 por pessoa</div><div style='margin-bottom:6px'><strong>Albergo Milano</strong> — Varenna | Terraço sobre a água, atmosfera romântica perfeita | ~€55-70 por pessoa</div><div style='margin-bottom:6px'><strong>Ristorante La Punta</strong> — Bellagio | Vista panorâmica dos dois ramos do lago | ~€60-75 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Ferry do lago: navigazionelaghi.it · Villa Melzi: villamelzi.it · Grand Hotel Tremezzo: grandhoteltremezzo.com","dica":""}],"deslocamentos":["Hotel → Bellagio: ferry, ~25 min, ~€7","Bellagio → Varenna: ferry, ~15 min, ~€5","Varenna → Hotel: ferry, ~30 min, ~€7"]},{"num":13,"data":"2026-08-29","titulo":"Lago di Como → Milão → Interlaken","resumo":"Despedida do lago e entrada na Suíça — uma das transições mais bonitas que uma viagem pode oferecer. Carro até Milão para devolver, almoço e trem para a Suíça. A chegada a Interlaken já entrega a recompensa: o Jungfrau ao fundo, ar puro e uma sensação de estar em outro mundo.","energia":"🟢 Leve","atividades":[{"horario":"08h00","nome":"Café da manhã e check-out","descricao":"","dica":""},{"horario":"09h00","nome":"Saída rumo a Milão (carro, ~45 min)","descricao":"Devolver o carro na agência mais próxima da Stazione Centrale de Milão — facilita o acesso ao trem sem carregar bagagem por muito tempo.","dica":"Confirmar horário de devolução com a locadora com antecedência — agosto tem movimento alto. Reservar o drop-off em Milão no momento do aluguel em Roma."},{"horario":"10h00","nome":"Devolução do carro em Milão","descricao":"Hertz, Avis e Europcar têm agências próximas da Stazione Centrale.","dica":""},{"horario":"11h00","nome":"Milão Centrale — depósito de bagagem e almoço","descricao":"A Stazione Centrale tem guarda-volumes (Kipoint) — ideal para deixar as malas e almoçar leve antes do trem.","dica":"Não há necessidade de explorar Milão — é parada logística. Um bom almoço perto da estação já resolve."},{"horario":"13h30","nome":"Trem Milão → Interlaken (EuroCity direto, ~3h30)","descricao":"Rota pelo túnel do Lötschberg — a paisagem vai mudando gradualmente de planície italiana para vales alpinos suíços. Deslumbrante.","dica":"Reservar os assentos com antecedência no sbb.ch — escolher lugar do lado direito da direção de viagem para melhores vistas. ~€60-90 por pessoa."},{"horario":"17h00","nome":"Chegada a Interlaken Ost e check-in","descricao":"","dica":""},{"horario":"17h30","nome":"Primeiro passeio na Höheweg","descricao":"O boulevard central de Interlaken entre os dois lagos, com vista para o Eiger, Mönch e Jungfrau. Simplesmente parar e olhar já é suficiente.","dica":""},{"horario":"20h00","nome":"Jantar em Interlaken","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Trem Milão → Interlaken</span><span>€75</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Guarda-volumes Milão</span><span>€8</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Milão</span><span>€25</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€55</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€163</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant Schuh</strong> — Interlaken | Clássico suíço, ambiente histórico, vista para o Jungfrau | ~€50-65 por pessoa</div><div style='margin-bottom:6px'><strong>Laterne</strong> — Interlaken | Cozinha suíça contemporânea, aconchegante | ~€40-55 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurante Victoria-Jungfrau</strong> — no hotel | Alta gastronomia alpina | ~€85-110 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Trens suíços e Swiss Travel Pass: sbb.ch / swisstravelsystem.com · Vinheta suíça: ch.ch/vignette","dica":""}],"deslocamentos":["Como → Milão: carro, ~45 min","Milão → Interlaken: trem EuroCity, ~3h30, ~€70/pessoa","A partir de agora: apenas trem, teleférico e a pé — carro devolvido."]},{"num":14,"data":"2026-08-30","titulo":"Lauterbrunnen: o Vale das Cachoeiras","resumo":"Lauterbrunnen é um dos vales mais espetaculares da Europa — 72 cachoeiras despencando das paredes rochosas que cercam o vilarejo. De trem de Interlaken, chegam em minutos a um cenário que parece irreal. Passeio tranquilo pelo vale, a famosa Staubbach Falls e a tarde livre para contemplar.","energia":"🟢 Leve","atividades":[{"horario":"08h30","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"09h15","nome":"Trem Interlaken Ost → Lauterbrunnen (~20 min)","descricao":"Coberto pelo Swiss Travel Pass.","dica":""},{"horario":"09h35","nome":"Chegada a Lauterbrunnen","descricao":"O vale se revela imediatamente ao sair da estação — paredes rochosas de 300m e cachoeiras por toda parte.","dica":""},{"horario":"10h00 – 12h00","nome":"Passeio pelo vale — Staubbach Falls","descricao":"Caminhada leve pela estrada principal do vale — plana, sem esforço. Staubbach Falls — a cachoeira mais famosa, 297m de queda livre, acessível a pé da estação. Entrada gratuita.","dica":"A névoa da cachoeira refresca no calor de agosto — levar uma camada leve caso queiram chegar perto."},{"horario":"11h00","nome":"Trümmelbach Falls (imperdível)","descricao":"Cachoeiras dentro da montanha — únicas no mundo. Acesso por elevador interno na rocha. ~20 min de caminhada do centro ou táxi local.","dica":"Entrada ~CHF 14 (~€15) por pessoa. Vale muito — é uma experiência geológica única. Moderadamente úmido dentro — levar jaqueta leve."},{"horario":"13h00","nome":"Almoço em Lauterbrunnen","descricao":"","dica":""},{"horario":"14h30","nome":"Mürren — vilarejo sem carros no alto do vale","descricao":"De Lauterbrunnen, teleférico + trem de montanha até Mürren (~25 min). Vilarejo alpino suspenso a 1.650m, sem carro nenhum, com vista direta para o Eiger, Mönch e Jungfrau.","dica":"Coberto pelo Swiss Travel Pass. Caminhar pelo vilarejo, tomar um café e simplesmente existir naquele cenário já é suficiente."},{"horario":"16h30","nome":"Retorno a Interlaken","descricao":"","dica":""},{"horario":"17h00","nome":"Descanso no hotel — spa ou piscina","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar em Interlaken","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Swiss Travel Pass 6 dias (~€360)</span><span>amortizado em todos os dias</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Trümmelbach Falls</span><span>€15</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Lauterbrunnen</span><span>€32</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Café em Mürren</span><span>€16</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€58</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€121 (+ Pass amortizado)</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant Horner</strong> — Lauterbrunnen | Vista para o vale, rösti e fondue | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Eiger Guesthouse</strong> — Mürren | Café e almoço leve com vista para o Eiger | ~€25-35 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant du Nord</strong> — Interlaken | Jantar clássico suíço, ambiente familiar | ~€40-55 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Trümmelbach Falls: truemmelbach.ch · Teleférico Lauterbrunnen-Mürren: schilthornbahn.ch · Swiss Travel Pass: swisstravelsystem.com","dica":""}],"deslocamentos":["Interlaken → Lauterbrunnen: trem, ~20 min, Swiss Travel Pass","Lauterbrunnen → Trümmelbach: a pé ~20 min ou táxi local ~CHF 10","Lauterbrunnen → Mürren: teleférico + trem, ~25 min, Swiss Travel Pass","Mürren → Interlaken: trem + teleférico, ~40 min, Swiss Travel Pass"]},{"num":15,"data":"2026-08-31","titulo":"Grindelwald: o Eiger de Perto","resumo":"Grindelwald é o vilarejo alpino mais dramático da região — dominado pela face norte do Eiger, uma das paredes rochosas mais famosas do mundo. De trem de Interlaken, chegam em 35 minutos a um cenário de cartão-postal. Passeio pela vila, subida de gôndola e tarde contemplativa com os Alpes na janela.","energia":"🟢 Leve-Moderado","atividades":[{"horario":"08h30","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"09h15","nome":"Trem Interlaken Ost → Grindelwald (~35 min)","descricao":"Coberto pelo Swiss Travel Pass. A viagem já é bonita — vale sentar do lado direito para ver o Eiger aparecer.","dica":""},{"horario":"10h00 – 12h00","nome":"Passeio por Grindelwald","descricao":"Vila charmosa de casas de madeira com o Eiger ao fundo. Rua principal com lojas de artesanato, chocolates e queijos suíços. O Grindelwald Terminal é o hub das gôndolas — moderno e bem sinalizado.","dica":""},{"horario":"10h30","nome":"First Cliff Walk — subida de gôndola até First (2.168m)","descricao":"A First Cliff Walk é uma passarela suspensa sobre o precipício com vista para o vale e as geleiras.","dica":"Gôndola ~CHF 50 ida e volta por pessoa (Swiss Travel Pass dá desconto de 25% — ~CHF 37). Nível físico: leve — a passarela é plana e com corrimão. Duração ~1h. Levar casaco — ventoso no alto."},{"horario":"12h30","nome":"Almoço no alto — Restaurante First","descricao":"Almoço com vista panorâmica para o Eiger e o vale de Grindelwald lá embaixo.","dica":""},{"horario":"14h00","nome":"Retorno de gôndola e passeio livre em Grindelwald","descricao":"Compras de chocolate, queijo e lembranças. Café na praça central.","dica":""},{"horario":"15h30","nome":"Trem Grindelwald → Interlaken (~35 min)","descricao":"","dica":""},{"horario":"16h30","nome":"Chegada e tarde livre no hotel","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar especial em Interlaken","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Gôndola First (com desconto Swiss Pass)</span><span>€40</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço First</span><span>€43</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Café/compras Grindelwald</span><span>€27</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€64</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€174</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant First</strong> — First (2.168m) | Almoço com vista para o Eiger | ~€40-50 por pessoa</div><div style='margin-bottom:6px'><strong>Café 3692</strong> — Grindelwald | Moderno e descontraído, no centro do vilarejo | ~€30-40 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant Schmitte</strong> — Interlaken | Jantar suíço tradicional, ambiente rústico elegante | ~€55-70 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Swiss Travel Pass: swisstravelsystem.com · Trens suíços: sbb.ch · Gôndolas Grindelwald: jungfrau.ch","dica":""}],"deslocamentos":["Interlaken → Grindelwald: trem, ~35 min, Swiss Travel Pass","Grindelwald → First: gôndola, ~25 min, ~CHF 37 com desconto Pass","Retorno: trem Grindelwald → Interlaken, ~35 min"]},{"num":16,"data":"2026-09-01","titulo":"Jungfraujoch: o Topo da Europa (3.454m)","resumo":"O dia mais alto da viagem — literalmente. O Jungfraujoch (3.454m) é chamado de 'Topo da Europa' e é uma das experiências mais extraordinárias dos Alpes. A subida de trem cremalheira pela montanha já é um espetáculo. Neve em pleno setembro, geleiras infinitas e um silêncio que impressiona. Dia para guardar na memória.","energia":"🟢 Leve (atenção à altitude)","atividades":[{"horario":"⚠️","nome":"Atenção","descricao":"ALTITUDE (3.454m): Algumas pessoas sentem leve tontura ou cansaço — completamente normal. Recomendações: subir devagar, não fazer esforço físico, beber bastante água, evitar álcool antes da subida. Se sentirem desconforto, descansar na estação — não há risco real para pessoas saudáveis.","dica":""},{"horario":"07h30","nome":"Café da manhã cedo e saída","descricao":"Sair cedo é essencial — o Jungfraujoch costuma ter nuvens no fim da tarde, especialmente em setembro. Manhã tem maior probabilidade de céu limpo.","dica":"Verificar previsão do tempo na véspera em jungfrau.ch — eles têm webcam ao vivo do topo."},{"horario":"08h00","nome":"Trem Interlaken Ost → Jungfraujoch","descricao":"Trajeto total: ~2h de trem, com baldeação em Grindelwald e Kleine Scheidegg. Swiss Travel Pass cobre até Grindelwald — de lá para cima é tarifa especial.","dica":"Bilhete Good Morning Ticket (saída antes das 08h): ~CHF 145 por pessoa — desconto significativo. Reservar online com antecedência em jungfrau.ch."},{"horario":"10h00 – 13h00","nome":"Jungfraujoch (3.454m)","descricao":"Sphinx Observatory — terraço com vista 360° para as geleiras e os Alpes. Geleira Aletsch — a maior geleira dos Alpes, visível do alto, 23km de comprimento. Palácio de Gelo — túneis e esculturas esculpidos dentro da geleira. Snow Fun Park — área de neve ao ar livre para fotos e primeiras pisadas na neve.","dica":"Levar óculos de sol escuros obrigatoriamente — a reverberação da neve machuca os olhos. Casaco de inverno essencial mesmo em setembro."},{"horario":"13h00","nome":"Almoço no Crystal Restaurant — Jungfraujoch","descricao":"Almoço no restaurante dentro da estação, a 3.454m. Não é gourmet, mas a experiência de almoçar no alto dos Alpes não tem preço.","dica":""},{"horario":"14h00","nome":"Descida de trem","descricao":"","dica":""},{"horario":"16h00","nome":"Chegada a Interlaken","descricao":"","dica":""},{"horario":"16h30","nome":"Descanso total no hotel","descricao":"Após a altitude, o corpo pede repouso. Spa, piscina ou simplesmente a cama.","dica":""},{"horario":"20h00","nome":"Jantar tranquilo","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Trem Jungfraujoch (Good Morning Ticket)</span><span>€155</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço no topo</span><span>€37</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Extras (loja de lembrança, fotos)</span><span>€21</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€58</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€271</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Crystal Restaurant</strong> — Jungfraujoch | Almoço histórico no topo da Europa | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant Metropole</strong> — Interlaken | Jantar com vista para o Jungfrau, ambiente refinado | ~€55-70 por pessoa</div><div style='margin-bottom:6px'><strong>Thai Garden</strong> — Interlaken | Para variar após dias de culinária europeia | ~€30-40 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Jungfraujoch reservas e webcam: jungfrau.ch · Swiss Travel Pass: swisstravelsystem.com · Trens suíços: sbb.ch","dica":""}],"deslocamentos":["Interlaken → Jungfraujoch: trem cremalheira, ~2h, ~CHF 145/pessoa com Good Morning Ticket","Retorno: mesmo trajeto, ~2h"]},{"num":17,"data":"2026-09-02","titulo":"Lago de Brienz e Iseltwald","resumo":"Depois da intensidade do Jungfraujoch, um dia de beleza serena à beira d'água. O Lago de Brienz é de um azul-turquesa impossível — um dos mais bonitos da Suíça. Passeio de barco, o vilarejo de Iseltwald que viralizou no mundo todo, e a tarde livre para simplesmente existir naquele cenário.","energia":"🟢 Leve","atividades":[{"horario":"09h00","nome":"Café da manhã tranquilo no hotel","descricao":"","dica":""},{"horario":"10h00","nome":"Barco Interlaken → Brienz (~1h15)","descricao":"O barco pelo Lago de Brienz é uma das experiências mais relaxantes da região — ~1h15 de travessia em águas turquesa com os Alpes ao redor.","dica":"Verificar horários em bls.ch — saídas regulares pela manhã. Sentar no convés externo para aproveitar a vista."},{"horario":"11h15","nome":"Brienz","descricao":"Pequeno vilarejo famoso pela tradição de entalhes em madeira — artesanato suíço mais autêntico. Passeio tranquilo, lojas artesanais e café à beira do lago.","dica":"Brienz Rothorn — trem a vapor histórico que sobe até 2.350m com vista deslumbrante. ~CHF 80 ida e volta. Opcional — leva ~3h entre subida, topo e descida. Bom para quem quiser mais montanha."},{"horario":"12h30","nome":"Almoço em Brienz","descricao":"","dica":""},{"horario":"14h00","nome":"Iseltwald — O Píer Famoso","descricao":"O píer de madeira que avança sobre o lago turquesa — ficou mundialmente famoso após aparecer na série coreana Crash Landing on You. Uma das fotos mais icônicas da Suíça.","dica":"De Brienz, pegar o barco ou trem de volta até Interlaken e descer em Iseltwald (~20 min). Entrada no píer ~CHF 5. Ir dia de semana — fins de semana têm fila."},{"horario":"15h30","nome":"Retorno a Interlaken","descricao":"","dica":""},{"horario":"16h00","nome":"Tarde livre — spa, leitura ou passeio pela Höheweg","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar em Interlaken","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Barcos e trens</span><span>cobertos pelo Swiss Travel Pass</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Entrada píer Iseltwald</span><span>€5</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Brienz Rothorn (opcional)</span><span>€85</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Brienz</span><span>€37</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€58</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€100 (sem Rothorn)</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant Lindenhügel</strong> — Brienz | Cozinha suíça clássica à beira do lago | ~€35-45 por pessoa</div><div style='margin-bottom:6px'><strong>Belvédère Strandhotel</strong> — Iseltwald | Almoço com vista direta para o lago turquesa | ~€40-55 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant du Nord</strong> — Interlaken | Jantar familiar, bom custo-benefício | ~€40-50 por pessoa</div>","dica":""}],"deslocamentos":["Interlaken → Brienz: barco, ~1h15, Swiss Travel Pass","Brienz → Iseltwald: barco ou trem, ~20 min, Swiss Travel Pass","Iseltwald → Interlaken: trem, ~15 min, Swiss Travel Pass"]},{"num":18,"data":"2026-09-03","titulo":"Berna: a Capital Medieval","resumo":"Escapada de um dia à capital suíça — Berna surpreende pela beleza medieval intacta, as arcadas cobertas (laubengänge) que protegem do sol e da chuva, e o charme despreocupado de uma cidade que não precisa se esforçar para impressionar. Arquitetura sem museus — exatamente o que Oswaldo e Mônica gostam.","energia":"🟢 Leve-Moderado","atividades":[{"horario":"09h00","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"09h45","nome":"Trem Interlaken → Berna (~50 min)","descricao":"Coberto pelo Swiss Travel Pass.","dica":""},{"horario":"10h40","nome":"Chegada a Berna","descricao":"","dica":""},{"horario":"11h00 – 13h00","nome":"Centro histórico de Berna — Patrimônio UNESCO","descricao":"As Laubengänge — 6km de arcadas cobertas medievais que percorrem o centro histórico. Zytglogge — torre do relógio astronômico do século XIII com mecanismo animado que funciona a cada hora cheia. Münster de Berna — catedral gótica com torre de 100m. Subir é opcional — ~254 degraus, vista panorâmica dos Alpes.","dica":"O centro de Berna é completamente plano e todo a pé — ótimo para o ritmo deles. Evitar a subida da torre no calor se estiverem cansados."},{"horario":"13h00","nome":"Almoço em Berna","descricao":"","dica":""},{"horario":"14h30 – 16h00","nome":"Rosengarten e vista panorâmica","descricao":"O Jardim das Rosas de Berna fica num morro com vista panorâmica para o centro histórico medieval e os Alpes ao fundo — uma das melhores vistas urbanas da Suíça. Entrada gratuita.","dica":"~15 min a pé do centro ou táxi (~CHF 10). O jardim tem café simpático para uma pausa."},{"horario":"16h30","nome":"Trem Berna → Interlaken (~50 min)","descricao":"","dica":""},{"horario":"17h30","nome":"Chegada e descanso","descricao":"","dica":""},{"horario":"20h00","nome":"Jantar — penúltima noite na Suíça","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Trens</span><span>cobertos pelo Swiss Travel Pass</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Münster (subida torre, opcional)</span><span>€5</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Berna</span><span>€43</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Café Rosengarten</span><span>€16</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar Interlaken</span><span>€64</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€128</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant Lötschberg</strong> — Berna | Especialidade em raclette e fondue, ambiente histórico | ~€40-55 por pessoa</div><div style='margin-bottom:6px'><strong>Café du Commerce</strong> — Berna | Almoço descontraído sob as arcadas medievais | ~€30-40 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant Metropole</strong> — Interlaken | Jantar elegante, boa carta de vinhos | ~€60-75 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Turismo Berna: bern.com · Zytglogge: bern.com/zytglogge · Trens: sbb.ch","dica":""}],"deslocamentos":["Interlaken → Berna: trem, ~50 min, Swiss Travel Pass","Berna: todo a pé ou táxi local","Berna → Interlaken: trem, ~50 min, Swiss Travel Pass"]},{"num":19,"data":"2026-09-04","titulo":"Harder Kulm, Thun e Despedida dos Alpes","resumo":"O último dia na Suíça merece ser vivido com calma e gratidão. Thun é uma cidade encantadora à beira do lago de mesmo nome — castelo medieval, rio cristalino e uma atmosfera tranquila que combina perfeitamente com uma despedida dos Alpes. Tarde livre em Interlaken para compras finais e um jantar especial de encerramento.","energia":"🟢 Leve-Moderado","atividades":[{"horario":"08h00","nome":"Café da manhã no hotel","descricao":"","dica":""},{"horario":"08h45","nome":"Funicular Interlaken → Harder Kulm (1.322m, ~10 min)","descricao":"A plataforma panorâmica em forma de 'Two Lakes Bridge' avança sobre o precipício com vista simultânea para o Lago Thun e o Lago Brienz, além do Eiger, Mönch e Jungfrau ao fundo.","dica":"Sair cedo é essencial — o Harder Kulm costuma ter névoa baixa no fim da manhã. Antes das 09h30 a visibilidade costuma ser perfeita. Bilhete ~CHF 34 ida e volta por pessoa (Swiss Travel Pass dá desconto de 25% — ~CHF 26)."},{"horario":"09h00 – 10h30","nome":"Harder Kulm — plataforma panorâmica e brunch","descricao":"Plataforma, café no restaurante do topo com vista inesquecível, fotos. Tempo total no alto ~1h30 já é suficiente.","dica":""},{"horario":"10h45","nome":"Descida do funicular","descricao":"","dica":""},{"horario":"11h15","nome":"Trem Interlaken → Thun (~20 min)","descricao":"","dica":""},{"horario":"11h35 – 13h30","nome":"Thun","descricao":"Schloss Thun — castelo medieval do século XII no alto da colina, com vista para o lago e os Alpes. Vista de fora já é deslumbrante — entrar é opcional (~CHF 12). Orla do Rio Aare — o rio de azul-turquesa surreal que corta a cidade. Centro histórico — as ruas com calçadas elevadas sobre as lojas é uma peculiaridade arquitetônica única de Thun.","dica":"Thun é bem menor que Berna — 2h já cobrem o essencial com calma."},{"horario":"13h30","nome":"Almoço em Thun à beira do lago","descricao":"","dica":""},{"horario":"14h30","nome":"Retorno a Interlaken (trem, ~20 min)","descricao":"","dica":""},{"horario":"15h00 – 18h00","nome":"Tarde livre em Interlaken","descricao":"Últimas compras — chocolate Läderach, queijos, souvenirs. Passeio final pela Höheweg com vista para o Jungfrau pela última vez.","dica":"Läderach tem loja em Interlaken — o melhor chocolate suíço fresco, feito no dia. Levar caixas para presentear no Brasil."},{"horario":"19h00","nome":"Jantar especial de despedida da Suíça","descricao":"","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Funicular Harder Kulm (com desconto Swiss Pass)</span><span>€28</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Schloss Thun (opcional)</span><span>€13</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Almoço Thun</span><span>€43</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Compras chocolate/souvenirs</span><span>€64</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Jantar especial</span><span>€85</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€233</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos","descricao":"<div style='margin-bottom:6px'><strong>Restaurant Harder Kulm</strong> — topo do funicular | Café da manhã ou brunch com vista panorâmica única | ~€25-35 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant Schloss Schadau</strong> — Thun | Castelo à beira do lago, almoço romântico inesquecível | ~€55-70 por pessoa</div><div style='margin-bottom:6px'><strong>Restaurant La Terrasse — Victoria-Jungfrau</strong> — Interlaken | Jantar de gala para encerrar a Suíça com estilo | ~€90-120 por pessoa</div>","dica":""},{"horario":"🔗","nome":"Links Úteis","descricao":"Harder Kulm reservas e horários: harderkulm.ch · Trens suíços: sbb.ch","dica":""}],"deslocamentos":["Hotel → Harder Kulm: funicular, ~10 min, saída próxima ao hotel","Interlaken → Thun: trem, ~20 min, Swiss Travel Pass","Thun → Interlaken: trem, ~20 min, Swiss Travel Pass"]},{"num":20,"data":"2026-09-05","titulo":"Interlaken → Paris: o Trem dos Sonhos","resumo":"Dia de viagem — mas que viagem. O trem de Interlaken a Paris atravessa os Alpes suíços, passa por Basileia e chega à Gare de Lyon em pleno coração de Paris. Uma das rotas ferroviárias mais bonitas da Europa. Chegada à tarde para se instalar, jantar tranquilo e aproveitar o último fim de noite europeu.","energia":"🟢 Leve","atividades":[{"horario":"07h30","nome":"Café da manhã e check-out","descricao":"","dica":""},{"horario":"08h30","nome":"Trem Interlaken → Paris Gare de Lyon","descricao":"Rota via Basileia e TGV — ~4h30 de viagem total. O trecho Basileia → Paris é operado pela SNCF/TGV — alta velocidade, muito confortável.","dica":"Reservar com antecedência no sbb.ch ou raileurope.com — bilhetes de 1ª classe ~€80-130 por pessoa. Escolher assentos do lado esquerdo na direção de viagem para melhores vistas alpinas na saída da Suíça."},{"horario":"13h00","nome":"Chegada Paris Gare de Lyon","descricao":"","dica":""},{"horario":"13h30","nome":"Transfer Gare de Lyon → Hotel","descricao":"Táxi ou Uber: ~20-30 min dependendo do bairro, ~€20-35.","dica":""},{"horario":"14h30","nome":"Check-in e descanso","descricao":"","dica":""},{"horario":"17h00","nome":"Passeio leve — bairro do hotel ou à beira do Sena","descricao":"Sem agenda — Paris já é conhecida. Um café, uma caminhada, o último fim de tarde europeu.","dica":""},{"horario":"20h00","nome":"Jantar final em Paris","descricao":"Uma última refeição especial para encerrar 22 dias de viagem inesquecível.","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px ais, café parisiense","descricao":"","dica":""},{"horario":"💡","nome":"Se hospedados no Le Grand Contrôle — Versailles","descricao":"Manhã nos jardins de Versailles antes do check-out — entrada exclusiva para hóspedes, sem turistas. Transfer para CDG ~45 min às ~14h para check-in tranquilo no dia seguinte.","dica":""},{"horario":"💡","nome":"Se hospedados no Hyatt CDG","descricao":"Café da manhã com calma, spa do hotel, compras no terminal do aeroporto. Sem necessidade de transfer — já estão no aeroporto.","dica":""},{"horario":"20h00","nome":"Jantar tranquilo e cedo","descricao":"Dormir cedo — voo parte às 10h20 do dia seguinte.","dica":""},{"horario":"💰","nome":"Custos Estimados (por pessoa)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Refeições do dia</span><span>€60-80</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Compras/extras</span><span>€20</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€80</span></div>","dica":""},{"horario":"🍽️","nome":"Restaurantes Sugeridos — Jantar Final","descricao":"<div style='margin-bottom:6px'><strong>Le Cinq</strong> — Four Seasons George V | 3 estrelas Michelin | ~€250-300/pessoa</div><div style='margin-bottom:6px'><strong>Septime</strong> — 11º arr. | Bistrô moderno e premiado | ~€80-100/pessoa</div><div style='margin-bottom:6px'><strong>Brasserie Lipp</strong> — Saint-Germain | Clássico parisiense de 1880 | ~€60-80/pessoa</div>","dica":""}],"deslocamentos":[]},{"num":22,"data":"2026-09-07","titulo":"Paris → Salvador: Volta para Casa","resumo":"22 dias de uma viagem extraordinária chegam ao fim. Paris → Salvador na executiva da Air France — a melhor forma de encerrar uma aventura inesquecível. Chegar descansado, com a memória cheia de paisagens, sabores e momentos únicos de Porto, Toscana, Florença, Lago di Como, Suíça e Paris.","energia":"✈️ Dia de Viagem","atividades":[{"horario":"07h00 – 08h00","nome":"Café da manhã e partida para CDG","descricao":"Recomendado estar no aeroporto 3h antes para voos internacionais.","dica":"Check-in executiva Air France — fila exclusiva, lounge premium disponível antes do embarque."},{"horario":"10h20","nome":"Voo Paris CDG → Salvador (Air France Executiva)","descricao":"","dica":""},{"horario":"15h25","nome":"Chegada a Salvador 🇧🇷","descricao":"Bem-vindos de volta! 22 dias de uma viagem que ficará para sempre na memória de Oswaldo e Mônica.","dica":""},{"horario":"🗺️","nome":"Resumo da Viagem Completa","descricao":"🇵🇹 Porto — 1 noite · Ribeira, Douro, Caves de Vinho do Porto<br>🇮🇹 Toscana (Val d'Orcia) — 4 noites · Pienza, Siena, Brunello, bicicleta nas strade bianche<br>🇮🇹 Florença — 3 noites · Casamento · Chianti · Ponte Vecchio<br>🇮🇹 Lago di Como — 2 noites · Bellagio, Varenna, passeio de barco<br>🇨🇭 Interlaken / Suíça — 6 noites · Lauterbrunnen, Grindelwald, Jungfraujoch, Brienz, Berna, Harder Kulm<br>🇫🇷 Paris — 2 noites · Descanso pré-voo","dica":""},{"horario":"💰","nome":"Total Estimado da Viagem (casal)","descricao":"<div style='display:flex;justify-content:space-between;padding:2px 0'><span>Hospedagem (19 noites)</span><span>~€21.900</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Gastos diários (2 pessoas)</span><span>~€5.900</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Aluguel de carro (~14 dias)</span><span>~€1.000</span></div><div style='display:flex;justify-content:space-between;padding:2px 0'><span>Swiss Travel Pass (2 pessoas, 6 dias)</span><span>~€720</span></div><div style='display:flex;justify-content:space-between;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--accent)'><span>Total estimado do dia</span><span>~€29.520</span></div>","dica":""}],"deslocamentos":[]}],"do
