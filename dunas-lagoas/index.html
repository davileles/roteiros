function bDB(d){var dc=['#126eff','#22c55e','#f59e0b','#60a5fa','#a78bfa','#fb923c','#34d399'];var dots=(d.atividades||[]).slice(0,4).map(function(_,i){return'<div class="day-nav-dot" style="background:'+dc[i%dc.length]+'"></div>';}).join('');var ah=(d.atividades||[]).map(function(a,ai){var tb='';var next=(d.atividades||[])[ai+1];if(next)tb=bTB(a,next);return'<div class="atracao"><div class="atracao-header"><span class="atracao-time">'+(a.horario||'')+'</span><span class="atracao-nome">'+(a.nome||'')+'</span></div>'+(a.descricao?'<div class="atracao-desc">'+a.descricao+'</div>':'')+(a.dica?'<div class="atracao-tip">💡 '+a.dica+'</div>':'')+tb+'</div>';}).join('');var dh=(d.deslocamentos||[]).length?'<span class="day-section-label">Deslocamentos</span>'+(d.deslocamentos.map(function(dl){return'<div class="desl-item">'+dl+'</div>';}).join('')):'';return{nb:'<button class="day-nav-btn" onclick="jumpToDay('+d.num+')" id="day-nav-'+d.num+'"><span class="day-nav-num">'+d.num+'</span><span class="day-nav-label">'+((d.titulo||'Dia').substring(0,10))+'</span><div class="day-nav-dots">'+dots+'</div>'+(d.data?'<span style="font-size:9px;color:var(--muted2);margin-top:-2px">'+fmtDateBR(d.data).substring(0,5)+'</span>':'')+' </button>',bl:'<div class="day-block" id="day-'+d.num+'"><button class="day-toggle" onclick="toggleDay(this)"><div class="day-num-badge">'+String(d.num).padStart(2,'0')+'</div><div class="day-toggle-info">'+(d.data?'<div class="day-toggle-date">'+fmtDateBR(d.data)+'</div>':'')+' <div class="day-toggle-title">'+(d.titulo||'Dia '+d.num)+'</div>'+(d.resumo?'<div class="day-toggle-summary">'+d.resumo+'</div>':'')+' </div>'+(d.energia?'<span class="day-energy">'+d.energia+'</span>':'')+' <span class="day-chevron">▾</span></button><div class="day-content">'+ah+dh+'</div></div>'};}
function rR(){if(typeof ROTEIRO_DATA==='undefined')return;var D=ROTEIRO_DATA;if(D.heroImage)document.getElementById('hero-img').style.backgroundImage="url('"+D.heroImage+"')";document.getElementById('hero-eyebrow').textContent=D.eyebrow||'Travel Concierge';document.getElementById('hero-title').innerHTML=(D.titulo||'').replace(' & ','<br>');document.getElementById('hero-subtitle').textContent=D.subtitulo||'';document.getElementById('hero-pills').innerHTML=(D.pills||[]).map(function(p){return'<span class="pill">'+p+'</span>';}).join('');var nl=[['#visao-geral','Visão Geral']].concat(D.voos&&D.voos.length?[['#voos','Voos']]:[]).concat(D.hospedagem&&D.hospedagem.length?[['#hospedagem','Hotel']]:[]).concat(D.servicos&&D.servicos.length?[['#servicos','Serviços']]:[]).concat(D.dias&&D.dias.length?[['#roteiro','Roteiro']]:[]).concat(D.documentos&&D.documentos.length?[['#documentos','Documentos']]:[]);document.getElementById('topbar-nav').innerHTML=nl.map(function(n){return'<a href="'+n[0]+'">'+n[1]+'</a>';}).join('');var cards=D.visaoGeral||[];document.getElementById('overview-grid').innerHTML=cards.map(function(c){return'<div class="info-card '+(c.variant||'')+'"><span class="info-card-label">'+c.label+'</span><span class="info-card-value">'+c.value+'</span></div>';}).join('');if(D.obs){document.getElementById('obs-box').style.display='';document.getElementById('obs-text').innerHTML=D.obs;}if(D.voos&&D.voos.length){document.getElementById('voos').style.display='';document.getElementById('voos-container').innerHTML=D.voos.slice().sort(function(a,b){return((a.data||'')+' '+(a.horaPartida||'')).localeCompare((b.data||'')+' '+(b.horaPartida||''));}).map(bVC).join('');}if(D.hospedagem&&D.hospedagem.length){document.getElementById('hospedagem').style.display='';document.getElementById('hr-hospedagem').style.display='';document.getElementById('hospedagem-container').innerHTML=D.hospedagem.slice().sort(function(a,b){return(a.checkin||'').localeCompare(b.checkin||'');}).map(bHC).jo function toggleDay(btn){var c=btn.nextElementSibling;btn.classList.toggle('open',!btn.classList.contains('open'));c.classList.toggle('open',!c.classList.contains('open'));}const PROXY='https://cdv-proxy-production.up.railway.app';let _docsUploadados={};let _docsList=[];async function _metaGet(slug){try{const r=await fetch(PROXY+'/roteiros/doc-upload?slug='+encodeURIComponent(slug)+'&_='+Date.now());const d=await r.json();return(d.ok&&d.docs)?d.docs:{};}catch(e){return{};}}async function _metaSave(slug,meta){try{await fetch(PROXY+'/roteiros/doc-meta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug,meta:meta})});}catch(e){}}function _fileListHtml(docId){const files=_docsUploadados[docId]||[];if(!files.length)return'';return files.map(function(f,fi){const short=f.nome.length>20?f.nome.substring(0,17)+'...':f.nome;return'<div class="doc-uploaded" style="margin-top:4px">✅ <a href="'+f.rawUrl+'" target="_blank" class="doc-uploaded-link" title="'+f.nome+'">'+short+'</a><button class="doc-del-btn" title="Remover arquivo" onclick="removerDocArquivo(&quot;'+docId+'&quot;,'+fi+')">✕</button></div>';}).join('');}function _redrawDocs(){const grid=document.getElementById('docs-grid');grid.innerHTML=_docsList.map(function(doc){const docId=doc.docId;const titulo=(doc.titulo||'doc').replace(/'/g,'');return '<div class="doc-card" id="doccard-'+docId+'" style="position:relative"><button class="doc-card-del" title="Remover este cartao" onclick="removerDocCard(&quot;'+docId+'&quot;)" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;line-height:1;padding:0" onmouseover="this.style.color=&quot;var(--accent)&quot;" onmouseout="this.style.color=&quot;var(--muted2)&quot;">✕</button><span class="doc-icon">'+(doc.icon||'📄')+'</span><span class="doc-title">'+(doc.titulo||'')+'</span><span class="doc-meta">'+(doc.meta||'')+'</span>'+(doc.badge?'<span class="doc-badge '+(doc.badgeClas {if(!existingIds.has(ex.docId))_docsList.push(ex);}_docsUploadados={};Object.entries(meta).forEach(function(entry){const fileName=entry[0];const info=entry[1];if(fileName.indexOf('_')===0)return;const fileId=fileName.replace(/\.[^.]+$/,'');const docId=fileId.replace(/_\d+$/,'');const rawUrl='https://raw.githubusercontent.com/davileles/roteiros/main/'+slug+'/docs/'+fileName;if(!_docsUploadados[docId])_docsUploadados[docId]=[];if(!_docsUploadados[docId].some(function(x){return x.fileId===fileId;}))_docsUploadados[docId].push({nome:info.nome||fileName,rawUrl:rawUrl,mediaType:info.mediaType||'',fileId:fileId});});_redrawDocs();}function renderDocCards(documentos){_docsList=documentos.map(function(doc,i){return Object.assign({},doc,{docId:doc.docId||('doc_'+i)});});_redrawDocs();const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(slug)carregarDocsUpload(slug);}function triggerUpload(docId){const el=document.getElementById('input-'+docId);if(el)el.click();}async function handleDocUpload(docId,nomeDoc,input){const file=input.files&&input.files[0];if(!file)return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(!slug){alert('Slug do roteiro nao definido.');return;}const maxMB=8;if(file.size>maxMB*1024*1024){alert('Arquivo muito grande. Maximo '+maxMB+'MB.');input.value='';return;}const ext=file.name.split('.').pop().toLowerCase();const fileId=docId+'_'+Date.now();const fileName=fileId+'.'+ext;document.getElementById('uploading-'+docId).style.display='';try{const b64=await new Promise(function(res,rej){const r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});const resp=await fetch(PROXY+'/roteiros/doc-upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug,docId:fileName,nome:nomeDoc,tipo:ext,base64:b64,mediaType:file.type})});const data=await resp.json();if(!data.ok)throw new Error(data.erro||'Erro no upload');if(!_docsUploadados[docId])_docsUploadados[docId]=[];_docsUploadados[docId].push({nome:file.name,rawUrl:data.rawUrl,mediaType:file.type,fileId:fileId});document.getElementById('uploading-'+docId).style.display='none';document.getElementById('upload-status-'+docId).innerHTML=_fileListHtml(docId);}catch(e){alert('Erro ao enviar arquivo: '+e.message);document.getElementById('uploading-'+docId).style.display='none';}input.value='';}async function removerDocArquivo(docId,fi){const files=_docsUploadados[docId]||[];const f=files[fi];if(!f)return;if(!confirm('Remover "'+f.nome+'"?'))return;_docsUploadados[docId].splice(fi,1);document.getElementById('upload-status-'+docId).innerHTML=_fileListHtml(docId);const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;if(!slug)return;const ext=f.rawUrl.split('.').pop().toLowerCase();const fileName=f.fileId+'.'+ext;try{await fetch(PROXY+'/roteiros/doc-upload',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug,docId:fileName})});}catch(e){}}async function removerDocCard(docId){if(!confirm('Remover este cartao de documento?'))return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;_docsList=_docsList.filter(function(d){return d.docId!==docId;});delete _docsUploadados[docId];_redrawDocs();if(!slug)return;const meta=await _metaGet(slug);const deleted=new Set(meta._deletedCards||[]);deleted.add(docId);const extras=(meta._extraCards||[]).filter(function(e){return e.docId!==docId;});meta._deletedCards=Array.from(deleted);meta._extraCards=extras;await _metaSave(slug,meta);}async function adicionarDocCard(){const titulo=prompt('Nome do documento:');if(!titulo)return;const slug=ROTEIRO_DATA&&ROTEIRO_DATA._slug;const newId='doc_extra_'+Date.now();const novoCard={docId:newId,icon:'📄',titulo:titulo,meta:'Adicionado manualmente',badge:''};_docsList.push(novoCard);_redrawDocs();if(!slug)return;const meta=await _metaGet(slug);meta._extraCards=(meta._extraCards||[]).concat([novoCard]);await _metaSave(slug,meta);}function mostrarDocAnexado(docId){}async function removerDoc(docId){await removerDocArquivo(docId,0);}
