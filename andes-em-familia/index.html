<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Roteiro · Travel Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e2535;--surface:#2a3246;--surface2:#323c54;
  --border:#3d4a66;--border2:#4a5878;
  --accent:#ff585e;--accent2:#e04449;
  --blue:#126eff;--blue2:#0f5fe0;
  --text:#eeeeee;--muted:#8a9bbf;--muted2:#5a6a8a;
  --green:#22c55e;--r:10px;
  --font:'Plus Jakarta Sans',sans-serif;
  --display:'Barlow Condensed',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hero{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,#1e2535 18%,rgba(30,37,53,.7) 45%,rgba(30,37,53,.2) 70%,transparent 100%)}
.hero-content{position:relative;z-index:2;padding:0 40px 48px;max-width:900px}
.hero-eyebrow{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;display:block}
.hero-title{font-family:var(--display);font-size:clamp(48px,8vw,96px);font-weight:900;color:var(--text);line-height:.95;text-transform:uppercase;margin-bottom:10px}
.hero-subtitle{font-family:var(--display);font-size:clamp(20px,3vw,32px);font-weight:700;color:rgba(238,238,238,.7);text-transform:uppercase;letter-spacing:2px;margin-bottom:24px}
.hero-pills{display:flex;gap:10px;flex-wrap:wrap}
.pill{border:1px solid rgba(238,238,238,.2);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:600;color:rgba(238,238,238,.75);backdrop-filter:blur(8px);background:rgba(42,50,70,.4)}
.hero-stripe{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--blue));z-index:3}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(30,37,53,0);transition:background .3s,backdrop-filter .3s}
.topbar.scrolled{background:rgba(30,37,53,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-brand{font-family:var(--display);font-size:20px;font-weight:900;color:var(--text);text-transform:uppercase;display:flex;align-items:center;gap:10px}
.topbar-brand span{color:var(--accent)}
.topbar-nav{display:flex;gap:8px;flex-wrap:wrap}
.topbar-nav a{font-size:11px;font-weight:700;color:var(--muted);text-decoration:none;text-transform:uppercase;letter-spacing:.8px;padding:6px 12px;border-radius:6px;transition:color .15s,background .15s}
.topbar-nav a:hover{color:var(--text);background:var(--surface)}
.container{max-width:960px;margin:0 auto;padding:0 24px}
.section{padding:56px 0}
.section-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:8px;display:block}
.section-title{font-family:var(--display);font-size:clamp(28px,4vw,42px);font-weight:900;color:var(--text);text-transform:uppercase;line-height:1;margin-bottom:32px}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.overview-grid.two{grid-template-columns:repeat(2,1fr)}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;border-left:3px solid var(--blue)}
.info-card.coral{border-left-color:var(--accent)}.info-card.green{border-left-color:var(--green)}
.info-card-label{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:4px}
.info-card.coral .info-card-label{color:var(--accent)}.info-card.green .info-card-label{color:var(--green)}
.info-card-value{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.voo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;gap:24px;margin-bottom:10px}
.voo-lado{flex:1}.voo-city{font-family:var(--display);font-size:42px;font-weight:900;color:var(--text);line-height:1}
.voo-airport{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.voo-time{font-size:18px;font-weight:700;color:var(--accent);margin-top:4px}
.voo-date{font-size:12px;color:var(--muted)}
.voo-center{text-align:center;flex-shrink:0}
.voo-arrow{font-size:22px;color:var(--blue);display:block}
.voo-duration{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap}
.voo-badge{display:inline-block;font-size:10px;font-weight:700;background:rgba(18,110,255,.15);color:var(--blue);border:1px solid rgba(18,110,255,.3);border-radius:6px;padding:3px 8px;margin-top:8px}
.hotel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;display:flex;gap:16px;align-items:flex-start}
.hotel-icon{font-size:28px;flex-shrink:0}
.hotel-info{flex:1}
.hotel-nome{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.hotel-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.hotel-periodo{font-size:13px;font-weight:600;color:var(--accent);margin-top:4px}
.hotel-conf{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);margin-top:6px}
.serv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px}
.serv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.serv-card-header{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.serv-icon{font-size:20px;flex-shrink:0}
.serv-nome{font-size:13px;font-weight:700;color:var(--text)}
.serv-meta{font-size:11px;color:var(--muted);line-height:1.5}
.serv-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(18,110,255,.12);color:#60a5fa;border:1px solid rgba(18,110,255,.25);margin-top:6px}
.day-nav{position:sticky;top:68px;z-index:90;background:rgba(30,37,53,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);overflow-x:auto;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.day-nav-inner{display:flex;gap:4px;padding:10px 24px;min-width:max-content;margin:0 auto;justify-content:center}
.day-nav-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 14px;border:none;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font);transition:background .15s,color .15s;min-width:64px}
.day-nav-btn:hover{background:var(--surface);color:var(--text)}
.day-nav-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.day-nav-num{font-family:var(--display);font-size:22px;font-weight:900;line-height:1}
.day-nav-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.day-nav-dots{display:flex;gap:3px;justify-content:center}
.day-nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.day-block{margin-bottom:16px}
.day-toggle{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .15s,border-color .15s;text-align:left}
.day-toggle:hover{background:var(--surface2);border-color:var(--border2)}
.day-toggle.open{border-color:var(--blue);background:var(--surface2)}
.day-num-badge{font-family:var(--display);font-size:28px;font-weight:900;color:var(--accent);line-height:1;flex-shrink:0;width:52px}
.day-toggle-info{flex:1}
.day-toggle-date{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.day-toggle-title{font-family:var(--display);font-size:18px;font-weight:900;color:var(--text);text-transform:uppercase}
.day-toggle-summary{font-size:12px;color:var(--muted);margin-top:2px}
.day-chevron{color:var(--muted);font-size:18px;transition:transform .25s;flex-shrink:0}
.day-toggle.open .day-chevron{transform:rotate(180deg)}
.day-energy{font-size:11px;font-weight:700;background:#e1f5ee;color:#0f6e56;border-radius:20px;padding:3px 10px;flex-shrink:0}
.day-content{display:none;background:var(--surface);border:1px solid var(--blue);border-top:none;border-radius:0 0 var(--r) var(--r);padding:20px 24px;margin-top:-4px}
.day-content.open{display:block}
.atracao{padding:14px 0;border-bottom:1px solid var(--border)}
.atracao:last-child{border-bottom:none}
.atracao-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:6px}
.atracao-time{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;min-width:100px;flex-shrink:0;padding-top:2px}
.atracao-nome{font-size:15px;font-weight:700;color:var(--text)}
.atracao-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-left:114px;margin-top:0}
.atracao-tip{font-size:12px;color:#4ade80;font-style:italic;margin-left:114px;margin-top:4px;line-height:1.5}
.day-section-label{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:2px;margin:18px 0 8px;display:block;padding-bottom:6px;border-bottom:1px solid var(--border)}
.desl-item{font-size:13px;color:var(--muted);padding:5px 0 5px 14px;border-left:2px solid var(--blue);margin-bottom:6px;line-height:1.5}
.desl-arrow{color:var(--accent);font-weight:700;margin:0 4px}
.dica-box{background:rgba(18,110,255,.06);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:10px 14px;margin:8px 0}
.dica-box-text{font-size:13px;color:var(--muted);line-height:1.55}
.dica-box-text strong{color:var(--text)}
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:8px}
.doc-icon{font-size:28px}.doc-title{font-size:13px;font-weight:700;color:var(--text)}
.doc-meta{font-size:11px;color:var(--muted)}
.doc-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);width:fit-content}
.doc-badge.pending{background:rgba(255,88,94,.12);color:var(--accent);border-color:rgba(255,88,94,.25)}
.finance-table{width:100%;border-collapse:collapse}
.finance-table th{background:var(--surface2);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:10px 14px;text-align:left}
.finance-table td{font-size:13px;color:var(--muted);padding:9px 14px;border-bottom:1px solid var(--border)}
.finance-table td:last-child{text-align:right;font-weight:600;color:var(--text)}
.finance-table tr:last-child td{border-bottom:none}
.finance-table .dia-num{font-family:var(--display);font-size:20px;font-weight:900;color:var(--accent)}
.finance-table .total-row td{font-weight:700;color:var(--accent);font-size:14px;border-top:1px solid var(--border2);border-bottom:none;background:rgba(255,88,94,.05)}
.finance-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.site-footer{background:var(--surface);border-top:1px solid var(--border);padding:32px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:var(--display);font-size:22px;font-weight:900;color:var(--text);text-transform:uppercase}
.footer-brand span{color:var(--accent)}
.footer-note{font-size:12px;color:var(--muted)}
hr.sec-div{border:none;border-top:1px solid var(--border);margin:0}
@media(max-width:680px){
  .topbar{padding:12px 20px}.topbar-nav{display:none}
  .hero-content{padding:0 20px 40px}.container{padding:0 16px}.section{padding:40px 0}
  .overview-grid{grid-template-columns:1fr 1fr}
  .voo-card{flex-direction:column;gap:12px}
  .atracao-desc,.atracao-tip{margin-left:0;margin-top:6px}
  .atracao-header{flex-direction:column;gap:4px}.atracao-time{min-width:unset}
  .site-footer{flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" id="topbar">
  <div class="topbar-brand">Travel <span>Concierge</span></div>
  <nav class="topbar-nav" id="topbar-nav">
    <!-- gerado por JS -->
  </nav>
</header>

<!-- DAY NAV -->
<nav class="day-nav" id="day-nav" style="display:none">
  <div class="day-nav-inner" id="day-nav-inner"></div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-img" id="hero-img"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <span class="hero-eyebrow" id="hero-eyebrow">Travel Concierge</span>
    <h1 class="hero-title" id="hero-title">Roteiro</h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-pills" id="hero-pills"></div>
  </div>
  <div class="hero-stripe"></div>
</section>

<!-- VISÃO GERAL -->
<section class="section" id="visao-geral">
  <div class="container">
    <span class="section-label">Visão Geral</span>
    <h2 class="section-title">A Viagem</h2>
    <div id="overview-grid-1" class="overview-grid"></div>
    <div id="overview-grid-2" class="overview-grid"></div>
    <div id="obs-box" style="display:none" class="dica-box"><span class="dica-box-text" id="obs-text"></span></div>
  </div>
</section>

<hr class="sec-div"/>

<!-- VOOS -->
<section class="section" id="voos" style="display:none">
  <div class="container">
    <span class="section-label">Voos</span>
    <h2 class="section-title">Ida &amp; Volta</h2>
    <div id="voos-container"></div>
  </div>
</section>

<hr class="sec-div" id="hr-hospedagem" style="display:none"/>

<!-- HOSPEDAGEM -->
<section class="section" id="hospedagem" style="display:none">
  <div class="container">
    <span class="section-label">Hospedagem</span>
    <h2 class="section-title">Onde Ficar</h2>
    <div id="hospedagem-container"></div>
  </div>
</section>

<hr class="sec-div" id="hr-servicos" style="display:none"/>

<!-- SERVIÇOS (carro, passeio, seguro) -->
<section class="section" id="servicos" style="display:none">
  <div class="container">
    <span class="section-label">Serviços</span>
    <h2 class="section-title">Reservas &amp; Serviços</h2>
    <div id="servicos-grid" class="serv-grid"></div>
  </div>
</section>

<hr class="sec-div" id="hr-roteiro" style="display:none"/>

<!-- ROTEIRO DIA A DIA -->
<section class="section" id="roteiro" style="display:none">
  <div class="container">
    <span class="section-label">Dia a Dia</span>
    <h2 class="section-title">Roteiro</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</section>

<hr class="sec-div" id="hr-documentos" style="display:none"/>

<!-- DOCUMENTOS -->
<section class="section" id="documentos" style="display:none">
  <div class="container">
    <span class="section-label">Documentos</span>
    <h2 class="section-title">Pasta de Viagem</h2>
    <div class="docs-grid" id="docs-grid"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-brand">Travel <span>Concierge</span></div>
  <div class="footer-note" id="footer-note"></div>
</footer>

function fmtDateBR(iso) {
  if (!iso) return '';
  const p = iso.split('-');
  if (p.length === 3) return p[2]+'/'+p[1]+'/'+p[0];
  return iso;
}

function buildVooCard(v) {
  return `
  <div class="voo-card">
    <div class="voo-lado">
      <div class="voo-city">${v.origemIata||'???'}</div>
      <div class="voo-airport">${v.origemNome||''}</div>
      <div class="voo-time">${v.horaPartida||'—'}</div>
      <div class="voo-date">${v.data ? fmtDateBR(v.data) : ''}</div>
    </div>
    <div class="voo-center">
      <span class="voo-arrow">✈</span>
      <div class="voo-duration">Voo ${v.tipo==='ida'?'Ida':'Volta'}${v.nvoo?' · '+v.nvoo:''}</div>
      <span class="voo-badge">${v.cia||'Companhia a confirmar'}${v.classe?' · '+v.classe:''}</span>
      ${v.conexao?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Conexão: ${v.conexao}</div>`:''}
    </div>
    <div class="voo-lado" style="text-align:right">
      <div class="voo-city">${v.destinoIata||'???'}</div>
      <div class="voo-airport">${v.destinoNome||''}</div>
      <div class="voo-time">${v.horaChegada||'—'}</div>
      <div class="voo-date">${v.dataChegada ? fmtDateBR(v.dataChegada) : ''}</div>
    </div>
  </div>`;
}

function buildHotelCard(h) {
  return `
  <div class="hotel-card">
    <div class="hotel-icon">🏨</div>
    <div class="hotel-info">
      <div class="hotel-nome">${h.nome||'Hotel'}</div>
      <div class="hotel-meta">
        ${h.cidade ? `<span>📍 ${h.cidade}</span>` : ''}
        ${h.hospedes ? `<span>👥 ${h.hospedes}</span>` : ''}
        ${h.noites ? `<span>🌙 ${h.noites} noite${h.noites!=1?'s':''}</span>` : ''}
      </div>
      <div class="hotel-periodo">
        ${h.checkin ? fmtDateBR(h.checkin) : ''}${h.checkout ? ' → '+fmtDateBR(h.checkout) : ''}
      </div>
      ${h.conf ? `<span class="hotel-conf">Conf. ${h.conf}</span>` : ''}
    </div>
  </div>`;
}

function buildServCard(s) {
  return `
  <div class="serv-card">
    <div class="serv-card-header">
      <span class="serv-icon">${s.icon||'📋'}</span>
      <span class="serv-nome">${s.nome||''}</span>
    </div>
    <div class="serv-meta">${s.meta||''}</div>
    ${s.badge ? `<span class="serv-badge">${s.badge}</span>` : ''}
  </div>`;
}

function buildDayBlock(d, idx) {
  const dotColors = ['#126eff','#22c55e','#f59e0b','#60a5fa','#a78bfa','#fb923c','#34d399'];
  const dots = (d.atividades||[]).slice(0,4).map((_,i) =>
    `<div class="day-nav-dot" style="background:${dotColors[i%dotColors.length]}"></div>`
  ).join('');

  const ativsHtml = (d.atividades||[]).map(a => `
    <div class="atracao">
      <div class="atracao-header">
        <span class="atracao-time">${a.horario||''}</span>
        <span class="atracao-nome">${a.nome||''}</span>
      </div>
      ${a.descricao ? `<div class="atracao-desc">${a.descricao}</div>` : ''}
      ${a.dica ? `<div class="atracao-tip">💡 ${a.dica}</div>` : ''}
    </div>`).join('');

  const deslHtml = (d.deslocamentos||[]).length ? `
    <span class="day-section-label">Deslocamentos</span>
    ${d.deslocamentos.map(dl => `<div class="desl-item">${dl}</div>`).join('')}` : '';

  const custosHtml = (d.custos||[]).length ? `
    <span class="day-section-label">Custos Estimados</span>
    ${d.custos.map(c => `<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.06)"><span>${c.label}</span><span>${c.valor}</span></div>`).join('')}
    ${d.custoTotal ? `<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:var(--accent);padding:8px 0 0;border-top:1px solid var(--border);margin-top:4px"><span>Total estimado</span><span>${d.custoTotal}</span></div>` : ''}` : '';

  return {
    navBtn: `
    <button class="day-nav-btn" onclick="jumpToDay(${d.num})" id="day-nav-${d.num}">
      <span class="day-nav-num">${d.num}</span>
      <span class="day-nav-label">${(d.titulo||'Dia').substring(0,10)}</span>
      <div class="day-nav-dots">${dots}</div>
      ${d.data ? `<span style="font-size:9px;color:var(--muted2);margin-top:-2px">${fmtDateBR(d.data).substring(0,5)}</span>` : ''}
    </button>`,
    block: `
    <div class="day-block" id="day-${d.num}">
      <button class="day-toggle" onclick="toggleDay(this)">
        <div class="day-num-badge">${String(d.num).padStart(2,'0')}</div>
        <div class="day-toggle-info">
          ${d.data ? `<div class="day-toggle-date">${fmtDateBR(d.data)}</div>` : ''}
          <div class="day-toggle-title">${d.titulo||'Dia '+d.num}</div>
          ${d.resumo ? `<div class="day-toggle-summary">${d.resumo}</div>` : ''}
        </div>
        ${d.energia ? `<span class="day-energy">${d.energia}</span>` : ''}
        <span class="day-chevron">▾</span>
      </button>
      <div class="day-content">
        ${ativsHtml}
        ${deslHtml}
        ${custosHtml}
      </div>
    </div>`
  };
}

function renderRoteiro() {
  if (typeof ROTEIRO_DATA === 'undefined') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#8a9bbf;font-size:14px">Nenhum roteiro carregado.</div>';
    return;
  }
  const D = ROTEIRO_DATA;

  // Title
  document.getElementById('page-title').textContent = (D.titulo||'Roteiro') + ' · Travel Concierge';

  // Hero
  if (D.heroImage) document.getElementById('hero-img').style.backgroundImage = `url('${D.heroImage}')`;
  document.getElementById('hero-eyebrow').textContent = D.eyebrow||'Travel Concierge';
  document.getElementById('hero-title').innerHTML = (D.titulo||'').replace(' & ','<br>');
  document.getElementById('hero-subtitle').textContent = D.subtitulo||'';
  document.getElementById('hero-pills').innerHTML = (D.pills||[]).map(p=>`<span class="pill">${p}</span>`).join('');

  // Topbar nav
  const navLinks = [
    ['#visao-geral','Visão Geral'],
    ...(D.voos?.length ? [['#voos','Voos']] : []),
    ...(D.hospedagem?.length ? [['#hospedagem','Hotel']] : []),
    ...(D.servicos?.length ? [['#servicos','Serviços']] : []),
    ...(D.dias?.length ? [['#roteiro','Roteiro']] : []),
    ...(D.documentos?.length ? [['#documentos','Documentos']] : []),
  ];
  document.getElementById('topbar-nav').innerHTML = navLinks.map(([h,l])=>`<a href="${h}">${l}</a>`).join('');

  // Visão geral
  const cards = D.visaoGeral||[];
  const half = Math.ceil(cards.length/2);
  const g1 = cards.slice(0,half), g2 = cards.slice(half);
  document.getElementById('overview-grid-1').innerHTML = g1.map(c=>`
    <div class="info-card ${c.variant||''}">
      <span class="info-card-label">${c.label}</span>
      <span class="info-card-value">${c.value}</span>
    </div>`).join('');
  document.getElementById('overview-grid-2').innerHTML = g2.map(c=>`
    <div class="info-card ${c.variant||''}">
      <span class="info-card-label">${c.label}</span>
      <span class="info-card-value">${c.value}</span>
    </div>`).join('');
  if (D.obs) {
    document.getElementById('obs-box').style.display = '';
    document.getElementById('obs-text').innerHTML = D.obs;
  }

  // Voos
  if (D.voos?.length) {
    document.getElementById('voos').style.display = '';
    document.getElementById('voos-container').innerHTML = D.voos.map(buildVooCard).join('');
  }

  // Hospedagem
  if (D.hospedagem?.length) {
    document.getElementById('hospedagem').style.display = '';
    document.getElementById('hr-hospedagem').style.display = '';
    document.getElementById('hospedagem-container').innerHTML = D.hospedagem.map(buildHotelCard).join('');
  }

  // Serviços
  if (D.servicos?.length) {
    document.getElementById('servicos').style.display = '';
    document.getElementById('hr-servicos').style.display = '';
    document.getElementById('servicos-grid').innerHTML = D.servicos.map(buildServCard).join('');
  }

  // Roteiro dia a dia
  if (D.dias?.length) {
    document.getElementById('roteiro').style.display = '';
    document.getElementById('hr-roteiro').style.display = '';
    document.getElementById('day-nav').style.display = '';
    const navEl = document.getElementById('day-nav-inner');
    const timelineEl = document.getElementById('timeline');
    navEl.innerHTML = '';
    timelineEl.innerHTML = '';
    D.dias.forEach((d,i) => {
      const { navBtn, block } = buildDayBlock(d, i);
      navEl.innerHTML += navBtn;
      timelineEl.innerHTML += block;
    });
  }

  // Documentos
  if (D.documentos?.length) {
    document.getElementById('documentos').style.display = '';
    document.getElementById('hr-documentos').style.display = '';
    document.getElementById('docs-grid').innerHTML = D.documentos.map(doc=>`
      <div class="doc-card">
        <span class="doc-icon">${doc.icon||'📄'}</span>
        <span class="doc-title">${doc.titulo||''}</span>
        <span class="doc-meta">${doc.meta||''}</span>
        ${doc.badge ? `<span class="doc-badge ${doc.badgeClass||''}">${doc.badge}</span>` : ''}
      </div>`).join('');
  }

  // Footer
  document.getElementById('footer-note').textContent = D.footerNote||D.titulo||'';
}

// Topbar scroll
window.addEventListener('scroll', ()=>{
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 60);
}, {passive:true});

// Toggle day
function toggleDay(btn) {
  const content = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  content.classList.toggle('open', !isOpen);
}

// Day nav
function jumpToDay(n) {
  const el = document.getElementById('day-'+n);
  if (!el) return;
  window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 160, behavior:'smooth'});
  document.querySelectorAll('.day-nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('day-nav-'+n);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
}

function updateDayNav() {
  if (!ROTEIRO_DATA?.dias?.length) return;
  let active = 1;
  ROTEIRO_DATA.dias.forEach(d => {
    const el = document.getElementById('day-'+d.num);
    if (el && el.getBoundingClientRect().top <= 170) active = d.num;
  });
  document.querySelectorAll('.day-nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('day-nav-'+active);
  if (btn) btn.classList.add('active');
}
window.addEventListener('scroll', updateDayNav, {passive:true});

document.addEventListener('DOMContentLoaded', ()=>{
  renderRoteiro();
  updateDayNav();
});
</script>
